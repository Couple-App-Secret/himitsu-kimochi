<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>縁結び</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');
        :root { --sakura: #f4a7b9; --sky: #8fcbe5; --canary: #f9d057; --text: #4a2535; --bg: #fffafb; --muted: #888; }
        
        /* クイック操作・コピーを徹底排除 */
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none !important;
        }
        input { -webkit-user-select: text !important; user-select: text !important; pointer-events: auto; }

        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background: var(--bg); font-family: 'Zen Maru Gothic', sans-serif; 
            color: var(--text); position: fixed;
        }

        .app-container { display: flex; flex-direction: column; height: 100dvh; width: 100%; }

        .header { 
            height: 65px; background: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border-bottom: 1px solid #fff5f7;
            flex-shrink: 0; z-index: 1000;
        }
        h1 { font-size: 1.1rem; color: var(--sakura); letter-spacing: 0.3em; font-weight: bold; }
        .update-tag { font-size: 0.65rem; color: var(--muted); }
        .settings-btn { position: absolute; right: 20px; color: #ccc; font-size: 1.2rem; cursor: pointer; padding: 10px; }

        #main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }

        .system-msg {
            background: #fff5f7; border-radius: 15px; padding: 12px; font-size: 0.75rem; 
            text-align: center; margin-bottom: 10px; border: 1px dashed var(--sakura);
        }

        .msg { max-width: 80%; padding: 10px 16px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; word-break: break-all; }
        .msg.me { align-self: flex-end; color: white; border-bottom-right-radius: 4px; }
        .msg.you { align-self: flex-start; background: white; border-bottom-left-radius: 4px; border: 2px solid; }

        .input-wrap {
            background: white; padding: 12px 15px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            border-top: 1px solid #f0f0f0; display: flex; gap: 10px; flex-shrink: 0;
            z-index: 1100;
        }
        #chatInput { flex: 1; padding: 12px 18px; border: none; border-radius: 25px; background: #f5f5f5; font-size: 16px; outline: none; }
        .send-btn { background: var(--sakura); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }

        .step { display: none; position: absolute; inset: 0; background: white; z-index: 500; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .step.active { display: flex; }
        .btn { width: 100%; max-width: 280px; padding: 16px; background: var(--sakura); color: white; border: none; border-radius: 30px; font-weight: bold; margin-top: 15px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 30px; width: 85%; max-width: 340px; }
        .color-pnl { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .c-btn { width: 35px; height: 35px; border-radius: 50%; border: 2px solid transparent; }
        .c-btn.active { border-color: #4a2535; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>縁 結 び</h1>
            <span class="update-tag">Ver. 2026-0421-23:45</span>
            <div id="gear" class="settings-btn" style="display:none;" onclick="openSettings()">⚙</div>
        </div>

        <div id="main-view">
            <div id="step0" class="step">
                <p style="color:var(--sakura); font-weight:bold; margin-bottom:15px;">※カタカナで入力してください</p>
                <input type="text" id="myName" placeholder="あなた" style="width:100%; max-width:280px; padding:15px; border:1px solid #eee; border-radius:15px; margin-bottom:10px; text-align:center;">
                <input type="text" id="crushName" placeholder="お相手" style="width:100%; max-width:280px; padding:15px; border:1px solid #eee; border-radius:15px; margin-bottom:20px; text-align:center;">
                <button class="btn" onclick="sendFeeling()">想いをおくる</button>
            </div>

            <div id="step-gate" class="step">
                <p style="font-weight:bold; margin-bottom:20px;">合言葉を入力</p>
                <input type="text" id="gatePass" style="width:100%; max-width:280px; padding:15px; border:1px solid #eee; border-radius:15px; margin-bottom:20px; text-align:center;">
                <button class="btn" onclick="checkGate()">鍵をあける</button>
            </div>

            <div id="step-achieved" class="step">
                <div style="font-size:2rem;">✨</div>
                <p style="color:var(--sakura); font-weight:bold; margin:10px 0 20px;">ご縁が結ばれました</p>
                <button class="btn" onclick="startChat()">チャットをはじめる</button>
            </div>

            <div id="chat-view" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
                <div id="chat-area">
                    <div id="welcome-msg" class="system-msg">
                        ご縁が結ばれました。<br>
                        右上の⚙から、<b>二人の合言葉</b>を決めて保存してくださいね。
                    </div>
                </div>
                <div class="input-wrap" id="inputWrap">
                    <input type="text" id="chatInput" placeholder="メッセージ..." autocomplete="off">
                    <button class="send-btn" onclick="sendMsg()">▶</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; margin-bottom:10px;">設定</h3>
            <p style="font-size:0.8rem; text-align:center; color:#888;">吹き出しの色選択</p>
            <div class="color-pnl">
                <div class="c-btn active" id="c-sakura" style="background:var(--sakura);" onclick="selectColor('--sakura', this)"></div>
                <div class="c-btn" id="c-sky" style="background:var(--sky);" onclick="selectColor('--sky', this)"></div>
                <div class="c-btn" id="c-canary" style="background:var(--canary);" onclick="selectColor('--canary', this)"></div>
            </div>
            <input type="text" id="newPass" style="width:100%; padding:12px; border:1px solid #eee; border-radius:10px; text-align:center;" placeholder="新しい合言葉を入力">
            <button class="btn" onclick="saveSettings()">保存</button>
            <button class="btn" style="background:#ff7675; font-size:0.8rem;" onclick="fullReset()">全ての履歴を消去</button>
            <p onclick="closeSettings()" style="text-align:center; margin-top:15px; font-size:0.8rem; color:#ccc; cursor:pointer;">とじる</p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", authDomain: "coupleapp-30f82.firebaseapp.com", databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", projectId: "coupleapp-30f82", appId: "1:205261235219:web:38b93dde060e520cdecbe6" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myName = localStorage.getItem('en_myName') || "";
    let partnerName = localStorage.getItem('en_partnerName') || "";
    let roomPath = (myName && partnerName) ? [myName, partnerName].sort().join('_') : "";
    let myColor = localStorage.getItem('en_myColor') || '--sakura';

    // Googleアプリ用・ウェブブラウザ用の高さ補正
    const setView = () => {
        if (!window.visualViewport) return;
        const vh = window.visualViewport.height;
        const offset = window.innerHeight - vh;
        document.getElementById('inputWrap').style.transform = `translateY(-${offset}px)`;
        window.scrollTo(0, 0);
    };
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setView);
        window.visualViewport.addEventListener('scroll', setView);
    }

    window.onload = () => { if (roomPath) sync(); else showStep('step0'); };

    function showStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        if(id) {
            document.getElementById(id).classList.add('active');
            document.getElementById('chat-view').style.display = 'none';
        } else {
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('gear').style.display = 'block';
        }
    }

    function sync() {
        onValue(ref(db, 'rooms/' + roomPath), (snap) => {
            const data = snap.val();
            if (!data) { if(localStorage.getItem('isChatting')) location.reload(); return; }
            if (data.status === 'achieved') {
                if (data.pass) document.getElementById('welcome-msg').style.display = 'none';
                if (data.pass && !sessionStorage.getItem('unlocked')) showStep('step-gate');
                else if (localStorage.getItem('isChatting')) { showStep(null); render(); }
                else showStep('step-achieved');
            }
        });
    }

    window.sendFeeling = async () => {
        myName = document.getElementById('myName').value.trim();
        partnerName = document.getElementById('crushName').value.trim();
        if (!myName || !partnerName) return;
        roomPath = [myName, partnerName].sort().join('_');
        localStorage.setItem('en_myName', myName);
        localStorage.setItem('en_partnerName', partnerName);
        await set(ref(db, `feelings/${roomPath}/${myName}`), { color: myColor });
        const snap = await get(ref(db, `feelings/${roomPath}`));
        if (snap.exists() && Object.keys(snap.val()).length >= 2) {
            await update(ref(db, 'rooms/' + roomPath), { status: 'achieved' });
        } else { alert("想いをおくりました。"); }
        sync();
    };

    window.startChat = () => { localStorage.setItem('isChatting', 'true'); showStep(null); render(); };

    function render() {
        // 相手の色をリアルタイム取得するためのリスナー
        onValue(ref(db, `feelings/${roomPath}`), (fSnap) => {
            const colors = fSnap.val() || {};
            onValue(ref(db, 'chats/' + roomPath), (snap) => {
                const area = document.getElementById('chat-area');
                const welcome = document.getElementById('welcome-msg');
                area.innerHTML = "";
                area.appendChild(welcome);
                snap.forEach(c => {
                    const d = c.val();
                    const senderColor = colors[d.sender]?.color || d.color || '--sakura';
                    const m = document.createElement('div');
                    m.className = `msg ${d.sender === myName ? 'me' : 'you'}`;
                    if(d.sender === myName) {
                        m.style.background = `var(${senderColor})`;
                    } else {
                        m.style.borderColor = `var(${senderColor})`;
                    }
                    m.innerText = d.text;
                    area.appendChild(m);
                });
                area.scrollTop = area.scrollHeight;
            });
        });
    }

    window.sendMsg = async () => {
        const i = document.getElementById('chatInput');
        if (!i.value.trim()) return;
        await push(ref(db, 'chats/' + roomPath), { sender: myName, text: i.value, color: myColor });
        i.value = "";
    };

    window.selectColor = (c, el) => {
        myColor = c;
        localStorage.setItem('en_myColor', c);
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    };

    window.openSettings = () => { document.getElementById('settingsModal').style.display = 'flex'; };
    window.closeSettings = () => { document.getElementById('settingsModal').style.display = 'none'; };

    window.saveSettings = async () => {
        const p = document.getElementById('newPass').value.trim();
        if (p) await update(ref(db, 'rooms/' + roomPath), { pass: p });
        await update(ref(db, `feelings/${roomPath}/${myName}`), { color: myColor });
        closeSettings();
    };

    window.checkGate = async () => {
        const input = document.getElementById('gatePass').value.trim();
        const snap = await get(ref(db, 'rooms/' + roomPath));
        if (snap.val()?.pass === input) { sessionStorage.setItem('unlocked', 'true'); showStep(null); render(); }
        else alert("合言葉が違います");
    };

    window.fullReset = async () => {
        if(confirm("二人とも初期状態に戻ります。よろしいですか？")){
            await remove(ref(db, 'rooms/' + roomPath));
            await remove(ref(db, 'chats/' + roomPath));
            await remove(ref(db, 'feelings/' + roomPath));
            localStorage.clear(); sessionStorage.clear(); location.reload();
        }
    };
</script>
</body>
</html>
