<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>縁結びのお守り - 結 -</title>
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Couple-App-Secret/himitsu-kimochi/main/icon.PNG">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Couple-App-Secret/himitsu-kimochi/main/icon.PNG">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Shippori+Mincho:wght@400;700&display=swap');
        
        :root { 
            --jp-white: #FAF9F6;  /* 胡粉色 */
            --jp-red: #D15652;    /* 控えめな朱赤 */
            --jp-gold: #B49661;   /* 落ち着いた金 */
            --jp-ink: #333333;    /* 墨色 */
            --jp-sakura: #F5ECF2; /* 桜鼠 */
            --jp-line: #E0DDD5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            height: 100dvh; 
            background: var(--jp-white); 
            font-family: 'Zen Maru Gothic', sans-serif; 
            color: var(--jp-ink); 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
            background-image: radial-gradient(#e0ddd5 0.5px, transparent 0.5px);
            background-size: 20px 20px; /* 控えめなドットで和紙感を演出 */
        }

        .app-container { display: flex; flex-direction: column; height: 100%; }
        
        .header { 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(255,255,255,0.8); 
            backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--jp-line); 
            z-index: 100; 
            position: relative; 
        }

        h1 { 
            font-family: 'Shippori Mincho', serif;
            font-size: 1.1rem; 
            color: var(--jp-ink);
            letter-spacing: 0.3em; 
            font-weight: 700;
        }

        /* 繊細な水引のイメージ */
        .mizuhiki {
            width: 40px;
            height: 1px;
            background: var(--jp-red);
            margin: 5px auto;
            position: relative;
        }
        .mizuhiki::after {
            content: '●';
            color: var(--jp-red);
            font-size: 6px;
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
        }

        .exit-btn { position: absolute; left: 18px; font-size: 0.75rem; color: #999; letter-spacing: 0.1em; cursor: pointer; }
        .settings-trigger { position: absolute; right: 18px; font-size: 1.1rem; color: #ccc; cursor: pointer; }
        
        .view { display: none; flex: 1; flex-direction: column; position: relative; overflow: hidden; padding: 0 45px; align-items: center; justify-content: center; text-align: center; }
        .view.active { display: flex; }
        
        input[type="text"] { 
            width: 100%; 
            max-width: 280px; 
            padding: 15px; 
            border: none;
            border-bottom: 1px solid var(--jp-line);
            border-radius: 0;
            margin-bottom: 20px; 
            text-align: center; 
            font-size: 16px; 
            outline: none; 
            background: transparent;
            color: var(--jp-ink);
            font-family: 'Shippori Mincho', serif;
        }

        .info-txt { font-size: 0.75rem; color: var(--jp-gold); margin-bottom: 25px; letter-spacing: 0.1em; }
        
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; width: 100%; }
        .msg-row { display: flex; flex-direction: column; max-width: 80%; margin-bottom: 12px; }
        .msg-row.me { align-self: flex-end; align-items: flex-end; }
        .msg-row.you { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.6; }
        .msg.me { background: var(--jp-sakura); color: var(--jp-ink); border-bottom-right-radius: 2px; }
        .msg.you { background: #f0f0f0; color: var(--jp-ink); border-bottom-left-radius: 2px; }
        
        .input-wrap { 
            padding: 15px; 
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
            background: white; 
            display: flex; 
            gap: 12px; 
            border-top: 1px solid var(--jp-line);
            width: 100%;
        }
        #chatInput { 
            flex: 1; 
            padding: 12px 20px; 
            border: 1px solid var(--jp-line); 
            border-radius: 25px; 
            background: var(--jp-white); 
            font-size: 16px; 
            outline: none; 
        }
        .send-btn { 
            background: var(--jp-red); 
            color: white; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .btn { 
            width: 100%; 
            max-width: 280px; 
            padding: 16px; 
            background: var(--jp-ink); 
            color: white; 
            border: none; 
            border-radius: 4px; /* 四角形で少し凛とした印象に */
            font-weight: bold; 
            font-size: 0.9rem; 
            letter-spacing: 0.2em;
            font-family: 'Shippori Mincho', serif;
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: var(--jp-white); padding: 30px; border-radius: 4px; width: 85%; max-width: 320px; text-align: center; border: 1px solid var(--jp-gold); }
        
        .color-pnl { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .c-btn { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #ddd; }
        .c-btn.active { border: 2px solid var(--jp-red); transform: scale(1.1); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div id="exit" class="exit-btn" style="display:none;" onclick="handleExit()">戻る</div>
        <div>
            <h1>縁結びのお守り</h1>
            <div class="mizuhiki"></div>
        </div>
        <div id="gear" class="settings-trigger" style="display:none;" onclick="openModal()">⚙</div>
    </div>

    <div id="setup-view" class="view active">
        <p class="info-txt">御名前をカタカナで記してください</p>
        <input type="text" id="myName" placeholder="御自身" onchange="cleanInput(this)" onblur="cleanInput(this)">
        <input type="text" id="crushName" placeholder="御相手" onchange="cleanInput(this)" onblur="cleanInput(this)">
        <button class="btn" onclick="startMatching()">ご縁を祈念する</button>
    </div>

    <div id="waiting-view" class="view">
        <div style="font-size:1.5rem; margin-bottom:25px; color: var(--jp-gold); letter-spacing: 0.2em; font-family: 'Shippori Mincho', serif;">静寂</div>
        <p style="color:#999; font-size:0.85rem; letter-spacing: 0.1em;">御相手の願いを待っています</p>
        <p style="color:#ccc; font-size:0.7rem; margin-top:15px; letter-spacing: 0.05em;">二人の想いが重なるとき 扉が開きます</p>
    </div>

    <div id="match-view" class="view">
        <div style="font-size:1.5rem; margin-bottom:20px; color: var(--jp-red); font-family: 'Shippori Mincho', serif;">結</div>
        <p style="font-weight:bold; margin-bottom:25px; color:var(--jp-ink); letter-spacing: 0.1em;">ご縁が結ばれました</p>
        <div id="pass-auth-area" style="display:none; width:100%; margin-bottom:25px;">
            <input type="text" id="authPass" placeholder="合言葉を記す">
        </div>
        <button class="btn" onclick="attemptEntry()">扉をひらく</button>
    </div>

    <div id="chat-view" class="view" style="padding:0;">
        <div id="chat-area"></div>
        <div class="input-wrap">
            <input type="text" id="chatInput" placeholder="筆を執る..." autocomplete="off">
            <button class="send-btn" onclick="sendMsg()">▶</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <p style="font-size:0.9rem; margin-bottom:20px; font-family: 'Shippori Mincho', serif;">お清めと設定</p>
        <div class="color-pnl">
            <div class="c-btn" id="c-sakura" style="background:#F5ECF2;" onclick="selectColor('--jp-sakura')"></div>
            <div class="c-btn" id="c-blue" style="background:#E6F0F5;" onclick="selectColor('#E6F0F5')"></div>
            <div class="c-btn" id="c-green" style="background:#F0F5E6;" onclick="selectColor('#F0F5E6')"></div>
        </div>
        <input type="text" id="newPass" placeholder="入室の合言葉">
        <button class="btn" onclick="saveSettings()">保存</button>
        <button class="btn" style="background:#fdfdfd; color:#aaa; margin-top:15px; font-size:0.75rem; border:1px solid #eee;" onclick="fullReset()">ご縁をすべてお清めする</button>
        <p onclick="closeModal()" style="margin-top:20px; color:#ccc; font-size:0.8rem; cursor:pointer;">閉じる</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", authDomain: "coupleapp-30f82.firebaseapp.com", databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", projectId: "coupleapp-30f82", appId: "1:205261235219:web:38b93dde060e520cdecbe6" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myN = localStorage.getItem('en_me'), partnerN = localStorage.getItem('en_partner'), myColor = localStorage.getItem('en_color') || '--jp-sakura', room = "", correctPass = "", currentViewId = "";

    window.cleanInput = (el) => {
        let val = el.value;
        if (!val) return;
        val = val.replace(/[ぁ-ん]/g, (s) => String.fromCharCode(s.charCodeAt(0) + 0x60));
        val = val.replace(/[^ァ-ンヴー]/g, '');
        el.value = val.trim();
    };

    function showView(id) {
        currentViewId = id;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const exitBtn = document.getElementById('exit');
        exitBtn.style.display = (id === 'setup-view') ? 'none' : 'block';
        document.getElementById('gear').style.display = (id === 'chat-view') ? 'block' : 'none';
    }

    window.onload = () => { if (myN && partnerN) startSync(); else showView('setup-view'); updateColorUI(); };

    window.startMatching = async () => {
        const n1 = document.getElementById('myName').value.trim();
        const n2 = document.getElementById('crushName').value.trim();
        if (!n1 || !n2) return;
        myN = n1; partnerN = n2; room = [myN, partnerN].sort().join('_');
        localStorage.setItem('en_me', myN); localStorage.setItem('en_partner', partnerN);
        await update(ref(db, `matching/${room}/${myN}`), { active: true, color: myColor });
        startSync();
    };

    function startSync() {
        room = [myN, partnerN].sort().join('_');
        onValue(ref(db, `matching/${room}`), (snap) => {
            const data = snap.val() || {};
            if (!data[myN] || !data[myN].active) {
                 localStorage.clear();
                 document.getElementById('myName').value = "";
                 document.getElementById('crushName').value = "";
                 myN = ""; partnerN = "";
                 showView('setup-view'); 
                 return;
            }
            correctPass = (data.pass || "").trim();
            const isMatch = (data[myN] && data[myN].active && data[partnerN] && data[partnerN].active);

            if (localStorage.getItem('en_chatActive')) {
                if (isMatch) { showView('chat-view'); initChat(); }
                else { localStorage.removeItem('en_chatActive'); showView('waiting-view'); }
            } else {
                if (isMatch) {
                    document.getElementById('pass-auth-area').style.display = correctPass ? 'block' : 'none';
                    showView('match-view');
                } else {
                    showView('waiting-view');
                }
            }
        });
    }

    window.attemptEntry = () => {
        if (correctPass && document.getElementById('authPass').value.trim() !== correctPass) { alert("合言葉が違います"); return; }
        localStorage.setItem('en_chatActive', 'true');
        showView('chat-view');
        initChat();
    };

    function initChat() {
        onValue(ref(db, `matching/${room}`), (mSnap) => {
            const mData = mSnap.val() || {};
            if (!mData[myN]) return;
            onValue(ref(db, 'chats/' + room), (snap) => {
                const area = document.getElementById('chat-area');
                area.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val(), isMe = (d.s === myN), sColor = mData[d.s]?.color || '--jp-sakura';
                    const row = document.createElement('div'); row.className = `msg-row ${isMe ? 'me' : 'you'}`;
                    const m = document.createElement('div'); m.className = `msg ${isMe ? 'me' : 'you'}`;
                    if(isMe){
                        m.style.background = sColor.startsWith('--') ? `var(${sColor})` : sColor;
                    }
                    m.innerText = d.t;
                    row.appendChild(m); area.appendChild(row);
                });
                area.scrollTop = area.scrollHeight;
            });
        }, { onlyOnce: true });
    }

    window.sendMsg = () => {
        const i = document.getElementById('chatInput'); if (!i.value.trim()) return;
        push(ref(db, 'chats/' + room), { s: myN, t: i.value }); i.value = "";
    };

    window.handleExit = () => {
        if (currentViewId === 'chat-view') localStorage.removeItem('en_chatActive');
        else { localStorage.removeItem('en_me'); localStorage.removeItem('en_partner'); }
        location.reload();
    };

    window.saveSettings = async () => {
        const updates = {}; const p = document.getElementById('newPass').value.trim();
        if (p) updates['pass'] = p;
        updates[`${myN}/color`] = myColor;
        await update(ref(db, `matching/${room}`), updates);
        closeModal();
    };

    window.selectColor = (c) => { myColor = c; localStorage.setItem('en_color', c); updateColorUI(); };
    function updateColorUI() {
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
        let targetId = myColor.replace('--', '').replace('#', '').replace('jp-', '');
        const activeBtn = document.getElementById('c-' + targetId);
        if(activeBtn) activeBtn.classList.add('active');
    }
    window.openModal = () => { document.getElementById('newPass').value = correctPass; document.getElementById('settingsModal').style.display = 'flex'; };
    window.closeModal = () => document.getElementById('settingsModal').style.display = 'none';
    
    window.fullReset = async () => {
        if(confirm("すべてお清めしますか？")) {
            await remove(ref(db, `chats/${room}`));
            await remove(ref(db, `matching/${room}`));
            localStorage.clear();
            location.reload();
        }
    };
</script>
</body>
</html>
