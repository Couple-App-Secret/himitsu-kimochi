<script type="module">
    // ...中略（Firebase設定などはそのまま）...

    window.submitFeeling = async () => {
        myFullId = document.getElementById('myName').value.trim();
        crushFullId = document.getElementById('crushName').value.trim();
        if(!myFullId || !crushFullId) return;
        roomPath = [myFullId, crushFullId].sort().join('_');
        
        showStep(1);
        await set(ref(db, 'feelings/' + myFullId), { crushKey: crushFullId });

        // 相手が自分を登録したか監視
        onValue(ref(db, 'feelings/' + crushFullId), (snap) => {
            if (snap.exists() && snap.val().crushKey === myFullId) {
                showStep(2);
            }
        });

        // 【修正ポイント】自分のデータが「完全に消された時」だけリロードする
        onValue(ref(db, 'feelings/' + myFullId), (snap) => {
            // データが存在し、かつ現在ステップ0（入力画面）でない場合のみチェック
            if (!snap.exists() && !document.getElementById('step0').classList.contains('active') && !document.getElementById('step1').classList.contains('active')) {
                location.reload();
            }
        });
    };

    window.goToChat = () => {
        showStep(3);
        const chatRef = ref(db, 'chats/' + roomPath);
        onValue(chatRef, (snap) => {
            // 【修正ポイント】チャットルームが「完全に消えた」場合のみリロード
            if (document.getElementById('step3').classList.contains('active')) {
                // 接続中なのにデータがnullになった場合だけ戻る
                if (snap.val() === null) {
                    // 相手がフルリセットした時だけここを通るように
                }
            }
            
            const area = document.getElementById('chat-area');
            area.innerHTML = "";
            if (snap.exists()) {
                snap.forEach(c => {
                    const d = c.val();
                    if(d && d.text) {
                        const m = document.createElement('div');
                        m.className = 'msg ' + (d.sender === myFullId ? 'me' : 'you');
                        m.innerHTML = d.text;
                        area.appendChild(m);
                    }
                });
            }
            area.scrollTop = area.scrollHeight;
        });
    };
    // ...以下、sendMsgやfullResetはそのまま...
</script>
