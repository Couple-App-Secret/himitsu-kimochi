<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ひみつのきもち</title>

    <link rel="apple-touch-icon" href="https://Couple-App-Secret.github.io/himitsu-kimochi/icon.PNG">
    <link rel="icon" href="https://Couple-App-Secret.github.io/himitsu-kimochi/icon.PNG">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="縁結び">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');
        
        :root {
            --pink: #f4a7b9;
            --deep: #c2587a;
            --cream: #fff0f5;
            --text: #4a2535;
            --muted: #a38b96;
            --chat-bg: #e2ece9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .petal { position: absolute; border-radius: 0 50% 50% 50%; opacity: 0; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 0.6; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        .container { position: relative; z-index: 1; width: 100%; max-width: 380px; height: 90vh; display: flex; flex-direction: column; }

        .card {
            background: white;
            border-radius: 30px;
            padding: 25px 20px;
            box-shadow: 0 10px 30px rgba(194,88,122,0.1);
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1 { font-size: 1.6rem; color: var(--deep); margin-bottom: 5px; letter-spacing: 0.1em; }
        .subtitle { font-size: 0.8rem; color: var(--muted); margin-bottom: 20px; }

        .step { display: none; height: 100%; flex-direction: column; }
        .step.active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .label { font-size: 0.9rem; font-weight: 700; display: block; margin-bottom: 8px; text-align: left; }
        input[type="text"] {
            width: 100%; padding: 15px; border: 2px solid #f0f0f0; border-radius: 15px;
            font-size: 1rem; margin-bottom: 20px; transition: 0.3s; background: #fafafa;
        }

        .btn {
            width: 100%; padding: 18px; background: var(--pink); color: white;
            border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 5px 15px rgba(244,167,185,0.4);
        }

        /* チャット画面のデザイン */
        #chat-area {
            flex-grow: 1; background: var(--chat-bg); border-radius: 20px;
            margin: 10px 0; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: #85e249; color: #000; border-top-right-radius: 2px; }
        .msg.you { align-self: flex-start; background: white; color: #000; border-top-left-radius: 2px; }

        .chat-input-wrap { display: flex; gap: 8px; }
        .chat-input { flex-grow: 1; padding: 12px; border: none; border-radius: 25px; background: #f0f0f0; outline: none; }
        .send-btn { background: var(--pink); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; font-weight: bold; }

        .call-btn {
            background: #4cd964; color: white; border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
    </style>
</head>
<body>
    <div class="petals" id="petals"></div>

    <div class="container">
        <div class="card">
            <h1>SECRET</h1>
            
            <div class="step active" id="step0">
                <p class="subtitle">二人の気持ちを重ねます</p>
                <span class="label">あなたの氏名（カタカナ）</span>
                <input type="text" id="myName" placeholder="例：サトウ ハルト" maxlength="40">
                <span class="label">相手の氏名（カタカナ）</span>
                <input type="text" id="crushName" placeholder="例：スズキ ユナ" maxlength="40">
                <button class="btn" onclick="submitFeeling()">気持ちをおくる</button>
            </div>

            <div class="step" id="step1">
                <div style="margin-top:50px;">
                    <span style="font-size:4rem;">⏳</span>
                    <p style="font-weight:700; margin-top:20px;">相手を待っています...</p>
                    <p class="subtitle">相手も入力すると画面が変わります</p>
                </div>
            </div>

            <div class="step" id="step2">
                <button class="call-btn" onclick="startCall()">
                    <span>📞</span> 本人確認の通話
                </button>
                <div id="chat-area"></div>
                <div class="chat-input-wrap">
                    <input type="text" id="chatInput" class="chat-input" placeholder="メッセージを入力...">
                    <button class="send-btn" onclick="sendMsg()">▶</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8",
        authDomain: "coupleapp-30f82.firebaseapp.com",
        databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com",
        projectId: "coupleapp-30f82",
        storageBucket: "coupleapp-30f82.firebasestorage.app",
        messagingSenderId: "205261235219",
        appId: "1:205261235219:web:38b93dde060e520cdecbe6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myFullId = "";
    let roomPath = "";

    // 桜
    const petalEl = document.getElementById('petals');
    for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = '#f4a7b9';
        const s = 8 + Math.random() * 8;
        p.style.width = s + 'px'; p.style.height = s + 'px';
        p.style.animationDuration = (6 + Math.random() * 5) + 's';
        p.style.animationDelay = (Math.random() * 5) + 's';
        petalEl.appendChild(p);
    }

    function normalize(s) { return s.trim().replace(/\s+/g, '').toLowerCase(); }

    window.submitFeeling = async function() {
        const myName = document.getElementById('myName').value.trim();
        const crushName = document.getElementById('crushName').value.trim();
        if (!myName || !crushName) { alert('氏名を入力してください'); return; }

        myFullId = normalize(myName);
        const crushFullId = normalize(crushName);
        
        // チャットルームのIDを二人共通にする（名前をアルファベット順に並べて結合）
        roomPath = [myFullId, crushFullId].sort().join('_');

        try {
            await set(ref(db, 'feelings/' + myFullId), {
                name: myName,
                crushKey: crushFullId,
                timestamp: serverTimestamp()
            });
            
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step1').classList.add('active');

            onValue(ref(db, 'feelings/' + crushFullId), (snap) => {
                if (snap.exists() && snap.val().crushKey === myFullId) {
                    startChat();
                }
            });
        } catch(e) { alert('エラー'); }
    }

    function startChat() {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step2').classList.add('active');

        // チャットメッセージの監視
        onValue(ref(db, 'chats/' + roomPath), (snap) => {
            const chatArea = document.getElementById('chat-area');
            chatArea.innerHTML = "";
            snap.forEach((child) => {
                const data = child.val();
                const div = document.createElement('div');
                div.className = 'msg ' + (data.sender === myFullId ? 'me' : 'you');
                div.innerText = data.text;
                chatArea.appendChild(div);
            });
            chatArea.scrollTop = chatArea.scrollHeight;
        });
    }

    window.sendMsg = function() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        push(ref(db, 'chats/' + roomPath), {
            sender: myFullId,
            text: input.value,
            time: serverTimestamp()
        });
        input.value = "";
    }

    window.startCall = function() {
        alert("通話機能：相手に呼び出しを送信しました。\n（このデモでは呼び出し通知をシミュレートしています）");
    }
</script>
</body>
</html>
