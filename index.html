<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>縁結び</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');

        :root { --sakura: #f4a7b9; --gold: #d4af37; --text: #4a2535; --muted: #a38b96; --bg: #fffafb; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Zen Maru Gothic', sans-serif; color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* 画像のデザインを再現 */
        .container { flex: 1; display: flex; flex-direction: column; padding: 20px; padding-top: env(safe-area-inset-top); max-width: 450px; margin: 0 auto; width: 100%; }
        .card { background: white; border-radius: 40px; flex: 1; display: flex; flex-direction: column; padding: 40px 25px; box-shadow: 0 10px 40px rgba(194,88,122,0.05); position: relative; overflow: hidden; }
        
        .header { text-align: center; margin-bottom: 50px; position: relative; z-index: 10; }
        h1 { font-size: 1.4rem; color: var(--sakura); letter-spacing: 0.4em; font-weight: 700; margin-bottom: 5px; }
        .update-tag { font-size: 0.6rem; color: #ccc; font-family: monospace; }

        .step { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; z-index: 5; text-align: center; }
        .step.active { display: flex; }

        /* 入力エリア */
        .input-group { width: 100%; margin-bottom: 30px; }
        .guide-text { font-size: 0.75rem; color: var(--muted); margin-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 18px; border: none; border-radius: 20px; font-size: 1rem; margin-bottom: 15px; background: #fafafa; outline: none; text-align: center; color: var(--text); }
        
        .btn { width: 80%; padding: 18px; background: var(--sakura); color: white; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn:disabled { background: #fce4e9; color: white; opacity: 0.7; }

        /* 結縁画面の装飾 */
        .kirakira { font-size: 3rem; margin-bottom: 20px; }
        .status-msg { color: var(--sakura); font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
        .sub-msg { color: var(--muted); font-size: 0.85rem; margin-bottom: 40px; }

        /* チャット */
        #chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px 0; width: 100%; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 25px; font-size: 0.95rem; line-height: 1.5; }
        .msg.me { align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .msg.you { align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.sys { align-self: center; background: none; color: var(--muted); font-size: 0.75rem; text-align: center; max-width: 100%; }

        .color-sakura { background: #f4a7b9; color: white; }
        .color-white { background: #f9f9f9; color: var(--text); }

        .settings-btn { position: absolute; top: 30px; right: 30px; font-size: 1.2rem; cursor: pointer; color: #eee; z-index: 20; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.05); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; border: 1px solid #fdf0f3; }
    </style>
</head>
<body>

    <div id="settingsModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <p style="font-size:0.8rem; color:var(--muted); margin-bottom:20px;">設定</p>
            <input type="text" id="newPass" placeholder="合言葉を決める" style="font-size:0.8rem; padding:12px; margin-bottom:10px; background:#f5f5f5;">
            <button class="btn" onclick="savePass()" style="padding:12px; font-size:0.8rem; margin-bottom:20px;">合言葉を保存</button>
            <button class="btn" style="background:#ffb3b3; padding:12px; font-size:0.8rem;" onclick="fullReset()">ご縁をリセット</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>縁 結 び</h1>
                <span class="update-tag">Ver. 2026-0420-20:30</span>
                <div id="gear" class="settings-btn" style="display:none;" onclick="document.getElementById('settingsModal').style.display='flex'">⚙</div>
            </div>

            <div id="step0" class="step active">
                <div class="input-group">
                    <p class="guide-text">お名前はカタカナで入力してください</p>
                    <input type="text" id="myName" placeholder="あなたのお名前" oninput="checkInput()">
                    <input type="text" id="crushName" placeholder="お相手のお名前" oninput="checkInput()">
                </div>
                <button id="submitBtn" class="btn" onclick="sendFeeling()" disabled>想いをおくる</button>
            </div>

            <div id="step-waiting" class="step">
                <div class="kirakira">💌</div>
                <p class="status-msg" style="font-size:1rem; color:var(--muted);">お相手を待っています...</p>
                <p class="sub-msg">二人の想いが重なると、ご縁が結ばれます。</p>
                <p style="color:#eee; font-size:0.8rem; cursor:pointer;" onclick="cancelFeeling()">一度とりけす</p>
            </div>

            <div id="step-achieved" class="step">
                <div class="kirakira">✨</div>
                <p class="status-msg">ご縁が結ばれました</p>
                <p class="sub-msg">二人の大切な場所へ</p>
                <button class="btn" onclick="checkPass()">はじめる</button>
            </div>

            <div id="step-verify" class="step">
                <p class="guide-text" style="margin-bottom:20px;">合言葉を入力してください</p>
                <input type="text" id="passInput" placeholder="合言葉">
                <button class="btn" onclick="verifyPass()">確認</button>
            </div>

            <div id="step-chat" class="step" style="justify-content: flex-start;">
                <div id="chat-area"></div>
                <div style="display:flex; gap:10px; width:100%; padding-top:15px;">
                    <input type="text" id="chatInput" placeholder="メッセージ..." style="margin:0; text-align:left; flex:1; background:#f5f5f5;">
                    <button onclick="sendMsg()" style="background:var(--sakura); border:none; color:white; width:55px; border-radius:20px; font-size:1.2rem; cursor:pointer;">▶</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update, remove, get, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", authDomain: "coupleapp-30f82.firebaseapp.com", databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", projectId: "coupleapp-30f82", appId: "1:205261235219:web:38b93dde060e520cdecbe6" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myName = localStorage.getItem('enmusubi_myName') || "";
    let partnerName = localStorage.getItem('enmusubi_partnerName') || "";
    let roomPath = (myName && partnerName) ? [myName, partnerName].sort().join('_') : "";
    let roomInfo = {};
    let isChatting = false;

    window.onload = () => { if (roomPath) syncRoom(); };

    function showStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function syncRoom() {
        onValue(ref(db, 'rooms/' + roomPath), (snap) => {
            if (!snap.exists()) {
                if (roomPath) { localStorage.clear(); location.reload(); }
                return;
            }
            roomInfo = snap.val();
            if (roomInfo.status === 'achieved' && !isChatting) showStep('step-achieved');
        });
    }

    window.checkInput = () => {
        const v1 = document.getElementById('myName').value.trim();
        const v2 = document.getElementById('crushName').value.trim();
        document.getElementById('submitBtn').disabled = !(v1 && v2);
    };

    window.sendFeeling = async () => {
        myName = document.getElementById('myName').value.trim();
        partnerName = document.getElementById('crushName').value.trim();
        roomPath = [myName, partnerName].sort().join('_');
        localStorage.setItem('enmusubi_myName', myName);
        localStorage.setItem('enmusubi_partnerName', partnerName);
        showStep('step-waiting');
        await set(ref(db, 'feelings/' + myName), { crush: partnerName });
        onValue(ref(db, 'feelings/' + partnerName), (snap) => {
            if (snap.exists() && snap.val().crush === myName) achieve();
        });
    };

    async function achieve() {
        await update(ref(db, 'rooms/' + roomPath), { status: 'achieved' });
        await remove(ref(db, 'feelings/' + myName));
        syncRoom();
    }

    window.checkPass = () => {
        if (roomInfo.pass) showStep('step-verify');
        else startChat();
    };

    window.verifyPass = () => {
        if (document.getElementById('passInput').value === roomInfo.pass) startChat();
        else alert("合言葉が違います");
    };

    window.startChat = async () => {
        isChatting = true;
        showStep('step-chat');
        document.getElementById('gear').style.display = 'block';
        
        // 初めてチャットに入った時、システムメッセージを表示
        if (!roomInfo.pass) {
            const area = document.getElementById('chat-area');
            const m = document.createElement('div');
            m.className = 'msg sys';
            m.innerText = "ご縁が結ばれました。右上の⚙から二人だけの「合言葉」を決めて、この場所を守りましょう。";
            area.appendChild(m);
        }

        onValue(ref(db, 'chats/' + roomPath), (snap) => {
            const area = document.getElementById('chat-area');
            const sysMsg = area.querySelector('.sys');
            area.innerHTML = "";
            if (sysMsg) area.appendChild(sysMsg);
            snap.forEach(c => {
                const d = c.val();
                const m = document.createElement('div');
                m.className = `msg ${d.sender === myName ? 'me color-sakura' : 'you color-white'}`;
                m.innerText = d.text;
                area.appendChild(m);
            });
            area.scrollTop = area.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chatInput');
        if (!i.value.trim()) return;
        await push(ref(db, 'chats/' + roomPath), { sender: myName, text: i.value });
        i.value = "";
    };

    window.savePass = async () => {
        const p = document.getElementById('newPass').value.trim();
        if (p) {
            await update(ref(db, 'rooms/' + roomPath), { pass: p });
            alert("合言葉を保存しました");
            document.getElementById('newPass').value = "";
            document.getElementById('settingsModal').style.display = 'none';
        }
    };

    window.fullReset = async () => {
        if(confirm("すべてをリセットします。お相手の画面も戻ります。")){
            off(ref(db, 'rooms/' + roomPath));
            await remove(ref(db, 'rooms/' + roomPath));
            await remove(ref(db, 'chats/' + roomPath));
            localStorage.clear();
            location.reload();
        }
    };

    window.cancelFeeling = async () => {
        await remove(ref(db, 'feelings/' + myName));
        localStorage.clear();
        location.reload();
    };
</script>
</body>
</html>
