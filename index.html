<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ひみつのきもち</title>
    <link rel="apple-touch-icon" href="https://Couple-App-Secret.github.io/himitsu-kimochi/icon.PNG">
    <link rel="icon" href="https://Couple-App-Secret.github.io/himitsu-kimochi/icon.PNG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');
        :root { --pink: #f4a7b9; --deep: #c2587a; --cream: #fff0f5; --text: #4a2535; --muted: #a38b96; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; background: var(--cream); 
            font-family: 'Zen Maru Gothic', sans-serif; color: var(--text);
            overflow: hidden;
        }

        body { 
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .petal { position: absolute; border-radius: 0 50% 50% 50%; opacity: 0; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 0.6; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        .container { 
            position: relative; z-index: 1; width: 100%; max-width: 400px; 
            height: 100%; margin: 0 auto; display: flex; flex-direction: column; 
            padding: 10px;
        }

        .card { 
            background: white; border-radius: 30px; padding: 15px; 
            box-shadow: 0 10px 30px rgba(194,88,122,0.1); 
            flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;
        }

        .header { height: 40px; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
        h1 { font-size: 1.2rem; color: var(--deep); letter-spacing: 0.1em; }
        .reset-link { position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: 0.7rem; color: var(--muted); cursor: pointer; }

        .step { display: none; height: 100%; flex-direction: column; }
        .step.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #chat-area { 
            flex-grow: 1; background: rgba(255, 240, 245, 0.4); border-radius: 20px; 
            margin: 10px 0; overflow-y: auto; padding: 15px; display: flex; 
            flex-direction: column; gap: 8px; border: 1px solid var(--pink);
            -webkit-overflow-scrolling: touch;
        }

        .msg { max-width: 85%; padding: 8px 14px; border-radius: 18px; font-size: 1rem; line-height: 1.4; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--pink); color: white; border-top-right-radius: 2px; }
        .msg.you { align-self: flex-start; background: white; color: var(--text); border-top-left-radius: 2px; border: 1px solid #f0f0f0; }

        .chat-input-wrap { display: flex; gap: 8px; flex-shrink: 0; background: white; padding: 5px 0; }
        .chat-input { flex-grow: 1; padding: 12px 18px; border: 1px solid #f0f0f0; border-radius: 25px; font-size: 1rem; outline: none; background: #fafafa; }
        .send-btn { background: var(--pink); border: none; width: 42px; height: 42px; border-radius: 50%; color: white; flex-shrink: 0; }

        .input-group { margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #f0f0f0; border-radius: 15px; font-size: 1rem; outline: none; }
        .btn { width: 100%; padding: 18px; background: var(--pink); color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .btn:disabled { background: #ddd; }
    </style>
</head>
<body>
    <div class="petals" id="petals"></div>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>SECRET</h1>
                <div id="reset-trigger" class="reset-link" style="display:none;" onclick="fullReset()">縁をリセット</div>
            </div>
            
            <div class="step active" id="step0">
                <div style="margin: auto 0;">
                    <p style="text-align:center; font-size:0.8rem; color:var(--muted); margin-bottom:20px;">お互いの名前をカタカナで入力</p>
                    <div class="input-group"><input type="text" id="myName" placeholder="あなたの名前" oninput="validateInput()"></div>
                    <div class="input-group"><input type="text" id="crushName" placeholder="相手の名前" oninput="validateInput()"></div>
                    <button id="submitBtn" class="btn" onclick="submitFeeling()" disabled>気持ちをおくる</button>
                </div>
            </div>
            
            <div class="step" id="step1"><div style="margin: auto; text-align:center;"><span style="font-size:3rem;">⏳</span><p>相手を待っています...</p></div></div>
            <div class="step" id="step2"><div style="margin: auto; text-align:center;"><span style="font-size:3rem;">💖</span><h2 style="color:var(--deep);">想いが結ばれました</h2><button class="btn" style="margin-top:20px;" onclick="goToChat()">チャットを開始する</button></div></div>

            <div class="step" id="step3">
                <div id="chat-area"></div>
                <div class="chat-input-wrap">
                    <input type="text" id="chatInput" class="chat-input" placeholder="メッセージ..." autocomplete="off">
                    <button class="send-btn" onclick="sendMsg()">▶</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, serverTimestamp, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8",
        authDomain: "coupleapp-30f82.firebaseapp.com",
        databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com",
        projectId: "coupleapp-30f82",
        appId: "1:205261235219:web:38b93dde060e520cdecbe6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let myFullId = ""; let crushFullId = ""; let roomPath = "";

    // 絵文字を安全に扱うための処理
    const encodeStr = (str) => btoa(unescape(encodeURIComponent(str)));
    const decodeStr = (str) => decodeURIComponent(escape(atob(str)));

    window.validateInput = () => {
        const n1 = document.getElementById('myName').value.trim();
        const n2 = document.getElementById('crushName').value.trim();
        document.getElementById('submitBtn').disabled = !(n1 && n2);
    };

    window.submitFeeling = async () => {
        myFullId = document.getElementById('myName').value.trim().replace(/\s+/g, '');
        crushFullId = document.getElementById('crushName').value.trim().replace(/\s+/g, '');
        roomPath = [myFullId, crushFullId].sort().join('_');
        await set(ref(db, 'feelings/' + myFullId), { crushKey: crushFullId });
        showStep(1);
        onValue(ref(db, 'feelings/' + crushFullId), (snap) => {
            if (snap.exists() && snap.val().crushKey === myFullId) showStep(2);
        });
    }

    function showStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        document.getElementById('reset-trigger').style.display = (n === 3) ? 'block' : 'none';
    }

    window.goToChat = () => {
        showStep(3);
        onValue(ref(db, 'chats/' + roomPath), (snap) => {
            const area = document.getElementById('chat-area');
            area.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const m = document.createElement('div');
                m.className = 'msg ' + (d.sender === myFullId ? 'me' : 'you');
                m.innerText = d.isEncoded ? decodeStr(d.text) : d.text;
                area.appendChild(m);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    window.sendMsg = async () => {
        const i = document.getElementById('chatInput');
        const text = i.value.trim();
        if (!text) return;
        await push(ref(db, 'chats/' + roomPath), {
            sender: myFullId,
            text: encodeStr(text),
            isEncoded: true,
            time: serverTimestamp()
        });
        i.value = "";
    }

    window.fullReset = async () => {
        if (confirm("リセットしますか？")) {
            const updates = {};
            updates['feelings/' + myFullId] = null;
            updates['feelings/' + crushFullId] = null;
            updates['chats/' + roomPath] = null;
            await update(ref(db), updates);
            location.reload();
        }
    }

    // 桜
    const petalEl = document.getElementById('petals');
    for (let i = 0; i < 15; i++) {
        const p = document.createElement('div'); p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw'; p.style.background = '#f4a7b9';
        const s = 8 + Math.random() * 8; p.style.width = s + 'px'; p.style.height = s + 'px';
        p.style.animationDuration = (6 + Math.random() * 5) + 's'; p.style.animationDelay = (Math.random() * 5) + 's';
        petalEl.appendChild(p);
    }
</script>
</body>
</html>
