<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ひみつのきもち</title>

    <link rel="apple-touch-icon" href="https://Couple-App-Secret.github.io/himitsu-kimochi/icon.PNG">
    <link rel="icon" href="https://Couple-App-Secret.github.io/himitsu-kimochi/icon.PNG">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="縁結び">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');
        
        :root {
            --pink: #f4a7b9;
            --deep: #c2587a;
            --cream: #fff0f5;
            --text: #4a2535;
            --muted: #a38b96;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .petal { position: absolute; border-radius: 0 50% 50% 50%; opacity: 0; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 0.6; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        .container { position: relative; z-index: 1; width: 100%; max-width: 380px; height: 92vh; display: flex; flex-direction: column; }

        .card {
            background: white;
            border-radius: 30px;
            padding: 25px 20px;
            box-shadow: 0 10px 30px rgba(194,88,122,0.1);
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        h1 { font-size: 1.6rem; color: var(--deep); margin-bottom: 5px; letter-spacing: 0.1em; }
        .subtitle { font-size: 0.8rem; color: var(--muted); margin-bottom: 20px; }

        .step { display: none; height: 100%; flex-direction: column; justify-content: center; }
        .step.active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 入力欄のスタイル */
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-label { font-size: 0.75rem; color: var(--deep); font-weight: bold; margin-left: 5px; margin-bottom: 5px; display: block; }
        
        input[type="text"] {
            width: 100%; padding: 15px; border: 2px solid #f0f0f0; border-radius: 15px;
            font-size: 1rem; transition: 0.3s; background: #fafafa;
        }
        input[type="text"]:focus { border-color: var(--pink); outline: none; background: #fff; }

        .btn {
            width: 100%; padding: 18px; background: var(--pink); color: white;
            border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 5px 15px rgba(244,167,185,0.4); margin-top: 10px;
        }

        .heart-anim { font-size: 4rem; display: block; margin-bottom: 20px; animation: heartbeat 1.2s infinite; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        #chat-area {
            flex-grow: 1; background: rgba(255, 240, 245, 0.6); border-radius: 20px;
            margin: 10px 0; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
            border: 1px solid var(--pink);
        }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; text-align: left; }
        .msg.me { align-self: flex-end; background: var(--pink); color: white; border-top-right-radius: 2px; }
        .msg.you { align-self: flex-start; background: white; color: var(--text); border-top-left-radius: 2px; border: 1px solid #f0f0f0; }

        .chat-input-wrap { display: flex; gap: 8px; }
        .chat-input { flex-grow: 1; padding: 12px; border: 1px solid #f0f0f0; border-radius: 25px; background: #fff; outline: none; }
        .send-btn { background: var(--pink); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; }

        .reset-link {
            position: absolute; top: 15px; right: 20px; font-size: 0.7rem;
            color: var(--muted); text-decoration: underline; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="petals" id="petals"></div>

    <div class="container">
        <div class="card">
            <div id="reset-trigger" class="reset-link" style="display:none;" onclick="fullReset()">縁をリセット</div>
            <h1>SECRET</h1>
            
            <div class="step active" id="step0">
                <p class="subtitle">二人の気持ちを重ねます</p>
                <div class="input-group">
                    <label class="input-label">あなたの氏名（全角カタカナ）</label>
                    <input type="text" id="myName" placeholder="サトウ ハルト" maxlength="40" oninput="forceKatakana(this)">
                </div>
                <div class="input-group">
                    <label class="input-label">相手の氏名（全角カタカナ）</label>
                    <input type="text" id="crushName" placeholder="スズキ ユナ" maxlength="40" oninput="forceKatakana(this)">
                </div>
                <button class="btn" onclick="submitFeeling()">気持ちをおくる</button>
            </div>

            <div class="step" id="step1">
                <span style="font-size:4rem;">⏳</span>
                <p style="font-weight:700; margin-top:20px;">相手を待っています...</p>
                <div style="margin-top:30px;">
                    <button class="btn" style="background:var(--muted); font-size:0.9rem; padding:10px;" onclick="cancelWait()">やっぱりやめる</button>
                </div>
            </div>

            <div class="step" id="step2">
                <span class="heart-anim">💖</span>
                <h2 style="color:var(--deep); margin-bottom:10px;">おめでとうございます！</h2>
                <p style="font-weight:700; margin-bottom:20px;">二人の想いが結ばれました</p>
                <button class="btn" onclick="goToChat()">本人確認してチャットを開始</button>
            </div>

            <div class="step" id="step3">
                <div id="chat-area"></div>
                <div class="chat-input-wrap">
                    <input type="text" id="chatInput" class="chat-input" placeholder="メッセージ...">
                    <button class="send-btn" onclick="sendMsg()">▶</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8",
        authDomain: "coupleapp-30f82.firebaseapp.com",
        databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com",
        projectId: "coupleapp-30f82",
        storageBucket: "coupleapp-30f82.firebasestorage.app",
        messagingSenderId: "205261235219",
        appId: "1:205261235219:web:38b93dde060e520cdecbe6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myFullId = "";
    let crushFullId = "";
    let roomPath = "";

    // カタカナ強制入力のロジック
    window.forceKatakana = function(el) {
        // ひらがなをカタカナに変換
        let val = el.value.replace(/[ぁ-ん]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) + 0x60);
        });
        // カタカナ以外（英数字・記号・スペース等）を除去 ※空白は許可する場合は [^ァ-ヶー\s] にする
        val = val.replace(/[^ァ-ヶー]/g, '');
        el.value = val;
    };

    function normalize(s) { return s.trim().replace(/\s+/g, '').toLowerCase(); }

    window.submitFeeling = async function() {
        const myNameInput = document.getElementById('myName').value.trim();
        const crushNameInput = document.getElementById('crushName').value.trim();
        if (!myNameInput || !crushNameInput) { alert('カタカナで氏名を入力してください'); return; }

        myFullId = normalize(myNameInput);
        crushFullId = normalize(crushNameInput);
        roomPath = [myFullId, crushFullId].sort().join('_');

        await remove(ref(db, 'feelings/' + myFullId));

        await set(ref(db, 'feelings/' + myFullId), {
            name: myNameInput,
            crushKey: crushFullId,
            timestamp: serverTimestamp()
        });
        
        showStep(1);

        onValue(ref(db, 'feelings/' + myFullId), (snap) => {
            if (!snap.exists() && (document.getElementById('step2').classList.contains('active') || document.getElementById('step3').classList.contains('active'))) {
                alert("縁がリセットされました。");
                location.reload();
            }
        });

        onValue(ref(db, 'feelings/' + crushFullId), (snap) => {
            if (snap.exists() && snap.val().crushKey === myFullId) {
                showStep(2);
            }
        });
    }

    function showStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        document.getElementById('reset-trigger').style.display = (n === 3) ? 'block' : 'none';
    }

    window.cancelWait = async function() {
        if(myFullId) await remove(ref(db, 'feelings/' + myFullId));
        if(crushFullId) await remove(ref(db, 'feelings/' + crushFullId));
        location.reload();
    }

    window.goToChat = function() {
        showStep(3);
        onValue(ref(db, 'chats/' + roomPath), (snap) => {
            const chatArea = document.getElementById('chat-area');
            chatArea.innerHTML = "";
            snap.forEach((child) => {
                const data = child.val();
                const div = document.createElement('div');
                div.className = 'msg ' + (data.sender === myFullId ? 'me' : 'you');
                div.innerText = data.text;
                chatArea.appendChild(div);
            });
            chatArea.scrollTop = chatArea.scrollHeight;
        });
    }

    window.sendMsg = function() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        push(ref(db, 'chats/' + roomPath), {
            sender: myFullId,
            text: input.value,
            time: serverTimestamp()
        });
        input.value = "";
    }

    window.fullReset = async function() {
        if (confirm("二人の縁を完全にリセットしますか？")) {
            await remove(ref(db, 'feelings/' + myFullId));
            await remove(ref(db, 'feelings/' + crushFullId));
            await remove(ref(db, 'chats/' + roomPath));
            alert("リセットしました。");
            location.reload();
        }
    }

    // 桜
    const petalEl = document.getElementById('petals');
    for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = '#f4a7b9';
        const s = 8 + Math.random() * 8;
        p.style.width = s + 'px'; p.style.height = s + 'px';
        p.style.animationDuration = (6 + Math.random() * 5) + 's';
        p.style.animationDelay = (Math.random() * 5) + 's';
        petalEl.appendChild(p);
    }
</script>
</body>
</html>
