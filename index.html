<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>データ掃除中...</title>
</head>
<body>
    <h2>データを強制リセットしています...</h2>
    <p id="status">実行中...</p>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", 
        authDomain: "coupleapp-30f82.firebaseapp.com", 
        databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", 
        projectId: "coupleapp-30f82", 
        appId: "1:205261235219:web:38b93dde060e520cdecbe6" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // データベースの全項目を強制的に空にする
    async function forceReset() {
        try {
            await set(ref(db, 'chats'), null);
            await set(ref(db, 'feelings'), null);
            document.getElementById('status').innerText = "完了！元のコードに戻して再読み込みしてください。";
        } catch (e) {
            document.getElementById('status').innerText = "エラー: " + e.message;
        }
    }
    forceReset();
</script>
</body>
</html>
