<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>縁結び</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');
        :root { --sakura: #f4a7b9; --gold: #f9d057; --text: #4a2535; --muted: #a38b96; --bg: #fffafb; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Zen Maru Gothic', sans-serif; color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .container { flex: 1; display: flex; flex-direction: column; padding: 15px; padding-top: env(safe-area-inset-top); max-width: 450px; margin: 0 auto; width: 100%; }
        .card { background: white; border-radius: 35px; flex: 1; display: flex; flex-direction: column; padding: 25px 20px; box-shadow: 0 10px 40px rgba(194,88,122,0.05); position: relative; overflow: hidden; }
        .header { text-align: center; margin-bottom: 20px; position: relative; z-index: 10; }
        h1 { font-size: 1.3rem; color: var(--sakura); letter-spacing: 0.3em; font-weight: 700; }
        .update-tag { font-size: 0.6rem; color: #ccc; }
        .step { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; z-index: 5; text-align: center; }
        .step.active { display: flex; }
        input[type="text"] { width: 100%; padding: 16px; border: 1px solid #f0f0f0; border-radius: 18px; font-size: 1rem; margin-bottom: 15px; background: #fafafa; outline: none; text-align: center; color: var(--text); }
        .btn { width: 90%; padding: 16px; background: var(--sakura); color: white; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-delete { background: #ff9f9f; margin-top: 10px; }
        .info-banner { background: #fdfdfd; border: 1px dashed #eee; border-radius: 15px; padding: 15px; margin-bottom: 15px; font-size: 0.75rem; color: var(--muted); line-height: 1.6; }
        #chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px 0; width: 100%; }
        .msg { max-width: 80%; padding: 10px 16px; border-radius: 20px; font-size: 0.9rem; transition: background 0.3s; }
        .msg.me { align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.you { align-self: flex-start; border-bottom-left-radius: 4px; }
        .color-pink { background: #f4a7b9 !important; color: white !important; border: none; }
        .color-blue { background: #a2d2ff !important; color: white !important; border: none; }
        .color-yellow { background: #f9d057 !important; color: white !important; border: none; }
        .color-white { background: #ffffff !important; color: var(--text) !important; border: 1px solid #eee !important; }
        .settings-btn { position: absolute; top: 25px; right: 25px; font-size: 1.3rem; cursor: pointer; color: #bbb; z-index: 20; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; }
        .color-picker { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="settingsModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="font-size:1.1rem; margin-bottom:15px; color:var(--muted);">設定</h3>
            <p style="font-size:0.75rem; color:var(--muted);">あなたの吹き出しの色</p>
            <div class="color-picker">
                <div onclick="updateColor('pink')" class="color-dot" style="background:#f4a7b9;"></div>
                <div onclick="updateColor('blue')" class="color-dot" style="background:#a2d2ff;"></div>
                <div onclick="updateColor('yellow')" class="color-dot" style="background:#f9d057;"></div>
                <div onclick="updateColor('white')" class="color-dot" style="background:#ffffff; border:1px solid #eee;"></div>
            </div>
            <input type="text" id="newPass" placeholder="新しい合言葉(日本語OK)">
            <button class="btn" onclick="savePass()">合言葉を保存</button>
            <div style="height:1px; background:#eee; margin:20px 0;"></div>
            <button class="btn btn-delete" onclick="fullReset()">ご縁の履歴をすべて消去</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>縁 結 び</h1>
                <span class="update-tag">Ver. 2026-0420-21:30</span>
                <div id="gear" class="settings-btn" style="display:none;" onclick="document.getElementById('settingsModal').style.display='flex'">⚙</div>
            </div>

            <div id="step0" class="step active">
                <p style="font-size:0.75rem; color:var(--muted); margin-bottom:15px;">お名前はカタカナで入力してください</p>
                <input type="text" id="myName" placeholder="あなたのお名前" oninput="checkInput()">
                <input type="text" id="crushName" placeholder="お相手のお名前" oninput="checkInput()">
                <button id="submitBtn" class="btn" onclick="sendFeeling()" disabled>想いをおくる</button>
            </div>

            <div id="step-waiting" class="step">
                <div style="font-size:2.5rem; margin-bottom:20px;">💌</div>
                <p style="color:var(--muted); font-size:0.9rem;">お相手を待っています...</p>
                <p style="color:#eee; font-size:0.8rem; margin-top:30px; cursor:pointer;" onclick="cancelFeeling()">一度とりけす</p>
            </div>

            <div id="step-achieved" class="step">
                <div style="font-size:2.5rem; margin-bottom:15px;">✨</div>
                <p style="color:var(--sakura); font-size:1.3rem; font-weight:700;">ご縁が結ばれました</p>
                <button class="btn" onclick="checkPass()">はじめる</button>
            </div>

            <div id="step-verify" class="step">
                <input type="text" id="passInput" placeholder="合言葉を入力">
                <button class="btn" onclick="verifyPass()">確認</button>
            </div>

            <div id="step-chat" class="step" style="justify-content: flex-start;">
                <div class="info-banner" id="chatInfo">
                    ご縁が結ばれました。<br>右上の⚙から、<b>次回の入室に必要な合言葉</b>を二人で決めて保存してくださいね。
                </div>
                <div id="chat-area"></div>
                <div style="display:flex; gap:10px; width:100%; padding-top:10px; background:white;">
                    <input type="text" id="chatInput" placeholder="メッセージ..." style="margin:0; text-align:left; flex:1; background:#f2f2f2; border:none;">
                    <button onclick="sendMsg()" style="background:var(--sakura); border:none; color:white; width:50px; height:50px; border-radius:50%; font-size:1.2rem; cursor:pointer;">▶</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", authDomain: "coupleapp-30f82.firebaseapp.com", databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", projectId: "coupleapp-30f82", appId: "1:205261235219:web:38b93dde060e520cdecbe6" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myName = localStorage.getItem('enmusubi_myName') || "";
    let partnerName = localStorage.getItem('enmusubi_partnerName') || "";
    let roomPath = (myName && partnerName) ? [myName, partnerName].sort().join('_') : "";
    let roomInfo = {};
    let isChatting = false;

    window.onload = () => { if (roomPath) syncRoom(); };

    function showStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function syncRoom() {
        onValue(ref(db, 'rooms/' + roomPath), (snap) => {
            if (!snap.exists()) return;
            roomInfo = snap.val();
            if (roomInfo.status === 'achieved') {
                if (roomInfo.pass) document.getElementById('chatInfo').style.display = 'none';
                if (!isChatting) showStep('step-achieved');
                else renderMessages(); 
            }
        });
    }

    window.checkInput = () => {
        const v1 = document.getElementById('myName').value.trim();
        const v2 = document.getElementById('crushName').value.trim();
        document.getElementById('submitBtn').disabled = !(v1 && v2);
    };

    window.sendFeeling = async () => {
        myName = document.getElementById('myName').value.trim();
        partnerName = document.getElementById('crushName').value.trim();
        roomPath = [myName, partnerName].sort().join('_');
        localStorage.setItem('enmusubi_myName', myName);
        localStorage.setItem('enmusubi_partnerName', partnerName);
        showStep('step-waiting');
        await set(ref(db, 'feelings/' + myName), { crush: partnerName });
        onValue(ref(db, 'feelings/' + partnerName), (snap) => {
            if (snap.exists() && snap.val().crush === myName) achieve();
        });
    };

    async function achieve() {
        await update(ref(db, 'rooms/' + roomPath), { status: 'achieved' });
        await remove(ref(db, 'feelings/' + myName));
        syncRoom();
    }

    window.checkPass = () => {
        if (roomInfo.pass) showStep('step-verify');
        else startChat();
    };

    window.verifyPass = () => {
        if (document.getElementById('passInput').value === roomInfo.pass) startChat();
        else alert("合言葉が違います");
    };

    window.startChat = () => {
        isChatting = true;
        showStep('step-chat');
        document.getElementById('gear').style.display = 'block';
        onValue(ref(db, 'chats/' + roomPath), () => renderMessages());
    };

    function renderMessages() {
        const area = document.getElementById('chat-area');
        onValue(ref(db, 'chats/' + roomPath), (snap) => {
            area.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const col = roomInfo[d.sender] || 'pink';
                const m = document.createElement('div');
                m.className = `msg ${d.sender === myName ? 'me' : 'you'} color-${col}`;
                m.innerText = d.text;
                area.appendChild(m);
            });
            area.scrollTop = area.scrollHeight;
        }, { onlyOnce: false });
    }

    window.sendMsg = async () => {
        const i = document.getElementById('chatInput');
        if (!i.value.trim()) return;
        const text = i.value;
        i.value = ""; // 送信前に空にする（連続入力を防ぐ）
        await push(ref(db, 'chats/' + roomPath), { sender: myName, text: text });
    };

    window.updateColor = async (c) => {
        await update(ref(db, 'rooms/' + roomPath), { [myName]: c });
        document.getElementById('settingsModal').style.display = 'none';
    };

    window.savePass = async () => {
        const p = document.getElementById('newPass').value.trim();
        if (p) {
            await update(ref(db, 'rooms/' + roomPath), { pass: p });
            alert("合言葉を保存しました");
            document.getElementById('newPass').value = "";
            document.getElementById('settingsModal').style.display = 'none';
        }
    };

    window.fullReset = async () => {
        if(confirm("すべてをリセットします。")){
            await remove(ref(db, 'rooms/' + roomPath));
            await remove(ref(db, 'chats/' + roomPath));
            localStorage.clear();
            location.reload();
        }
    };

    window.cancelFeeling = async () => {
        await remove(ref(db, 'feelings/' + myName));
        localStorage.clear();
        location.reload();
    };
</script>
</body>
</html>
