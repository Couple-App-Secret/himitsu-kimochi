<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>縁結びのお守り</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Shippori+Mincho:wght@700&display=swap');
        
        :root { 
            --oma-white: #F4F2ED; 
            --oma-gold: #B8A078;
            --sango: #E57373;  
            --tsuyukusa: #5C7A95; 
            --kogane: #C5B358; 
            --oma-navy: #243354;
            --oma-red: #B02A26;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            height: 100dvh; background: var(--oma-white); 
            font-family: 'Zen Maru Gothic', sans-serif; 
            overflow: hidden; position: fixed; width: 100%; 
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MCIgaGVpZ2h0PSIzNC42NCIgdmlld0JveD0iMCAwIDYwIDM0LjY0Ij48cGF0aCBkPSJNMzAgMEwwIDM0LjY0aDYwek0wIDBoMzBMMTUgMjUuOTh6bTMwIDBoMzBMNDUgMjUuOTh6IiBmaWxsPSJub25lIiBzdHJva2U9IiNlZWUiIHN0cm9rZS13aWR0aD0iMC44Ii8+PC9zdmc+');
        }

        .app-container { display: flex; flex-direction: column; height: 100%; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); align-items: center; }

        .knot-area { padding: 30px 0 10px; text-align: center; position: relative; z-index: 20; }
        .knot-svg { width: 100px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .secret-title { font-family: 'Shippori Mincho', serif; font-size: 1.4rem; color: var(--oma-gold); letter-spacing: 0.4em; margin: 10px 0; font-weight: bold; }
        .sub-secret { font-size: 0.7rem; color: var(--oma-gold); letter-spacing: 0.3em; text-transform: uppercase; margin-top: -5px; opacity: 0.8; }
        
        .exit-btn { position: absolute; top: 15px; left: 15px; color: #ccc; font-size: 0.8rem; cursor: pointer; z-index: 100; padding: 5px; }
        .settings-trigger { position: absolute; top: 15px; right: 15px; color: var(--oma-gold); font-size: 1.2rem; cursor: pointer; z-index: 100; padding: 5px; }

        .view { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 0 40px; text-align: center; }
        .view.active { display: flex; }

        input[type="text"] {
            width: 100%; max-width: 280px; padding: 16px; background: rgba(255,255,255,0.8);
            border: 1px solid #e0ded9; border-radius: 8px; text-align: center; font-size: 16px; outline: none;
            color: var(--oma-navy); font-family: 'Shippori Mincho', serif; margin-bottom: 15px;
        }

        .btn { width: 100%; max-width: 280px; padding: 18px; background: var(--oma-navy); color: white; border: none; border-radius: 4px; font-weight: bold; font-family: 'Shippori Mincho', serif; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 1rem; letter-spacing: 0.1em; }

        /* チャットデザイン */
        #chat-view { padding: 0; justify-content: flex-start; }
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; width: 100%; }
        .msg-row { display: flex; flex-direction: column; max-width: 85%; margin-bottom: 12px; }
        .msg-row.me { align-self: flex-end; align-items: flex-end; }
        .msg-row.you { align-self: flex-start; align-items: flex-start; }
        .msg { padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; line-height: 1.6; box-shadow: 1px 1px 4px rgba(0,0,0,0.05); color: white; }
        .msg.me { border-bottom-right-radius: 1px; }
        .msg.you { border-bottom-left-radius: 1px; }
        
        .chat-input-wrap { padding: 12px 15px; background: var(--oma-white); border-top: 1px solid #e0ded9; display: flex; gap: 10px; width: 100%; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        #chatInput { flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 4px; outline: none; font-size: 16px; background: white; }
        .send-btn { background: var(--oma-navy); color: white; border: none; width: 50px; height: 44px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

        /* モーダル */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: var(--oma-white); padding: 30px; border-radius: 4px; width: 85%; max-width: 340px; text-align: center; border: 1px solid var(--oma-gold); }
        .color-pnl { display: flex; justify-content: center; gap: 20px; margin: 25px 0; }
        .c-btn { width: 50px; height: 50px; border-radius: 4px; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .c-btn.active { border-color: var(--oma-navy); transform: scale(1.1); box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="exit" class="exit-btn" style="display:none;" onclick="handleExit()">戻る</div>
    <div id="gear" class="settings-trigger" style="display:none;" onclick="openModal()">⚙</div>

    <div class="knot-area">
        <svg class="knot-svg" viewBox="0 0 100 60">
            <path d="M20 30 Q 20 10 35 15 L 65 45 Q 80 50 80 30 Q 80 10 65 15 L 35 45 Q 20 50 20 30" fill="none" stroke="#B02A26" stroke-width="5" />
            <path d="M20 30 Q 20 10 35 15 L 65 45 Q 80 50 80 30 Q 80 10 65 15 L 35 45 Q 20 50 20 30" fill="none" stroke="#243354" stroke-width="5" stroke-dasharray="10 5" />
            <circle cx="50" cy="30" r="5" fill="#B8A078" />
        </svg>
        <div class="secret-title">縁結び</div>
        <div class="sub-secret">Secret</div>
    </div>

    <div id="setup-view" class="view active">
        <p style="font-size:0.75rem; color:var(--oma-gold); margin-bottom:25px; letter-spacing: 0.1em;">御名前をカタカナで記してください</p>
        <input type="text" id="myName" placeholder="自身の名" onchange="cleanInput(this)">
        <input type="text" id="crushName" placeholder="相手の名" onchange="cleanInput(this)">
        <button class="btn" onclick="startMatching()">ご縁を願う</button>
    </div>

    <div id="waiting-view" class="view">
        <p style="color:var(--oma-gold); font-size:0.95rem; line-height:2; letter-spacing: 0.1em;">相手の願いを待っています...<br>想いが重なると扉が開きます。</p>
    </div>

    <div id="match-view" class="view">
        <div id="match-icon" style="font-size:3.5rem; margin-bottom:20px;">✨</div>
        <p id="match-text" style="font-weight:bold; color:var(--oma-red); margin-bottom:25px; font-size:1.1rem; letter-spacing: 0.2em;">ご縁が結ばれました</p>
        <div id="pass-auth-area" style="display:none; width:100%; margin-bottom:25px;">
            <input type="text" id="authPass" placeholder="合言葉を記す">
        </div>
        <button class="btn" onclick="attemptEntry()">はじめる</button>
    </div>

    <div id="chat-view" class="view">
        <div id="chat-area"></div>
        <div class="chat-input-wrap">
            <input type="text" id="chatInput" placeholder="想いを綴る..." autocomplete="off">
            <button class="send-btn" onclick="sendMsg()">送信</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3 style="font-family: 'Shippori Mincho', serif; margin-bottom:20px; color:var(--oma-navy);">設定</h3>
        <p style="font-size:0.8rem; color:#888;">吹き出しの色</p>
        <div class="color-pnl">
            <div class="c-btn" id="c-sango" style="background:#E57373;" onclick="selectColor('--sango')"></div>
            <div class="c-btn" id="c-tsuyukusa" style="background:#5C7A95;" onclick="selectColor('--tsuyukusa')"></div>
            <div class="c-btn" id="c-kogane" style="background:#C5B358;" onclick="selectColor('--kogane')"></div>
        </div>
        <input type="text" id="newPass" placeholder="合言葉を変更">
        <button class="btn" onclick="saveSettings()">保存</button>
        <button class="btn" style="background:var(--oma-red); margin-top:12px; font-size:0.8rem;" onclick="fullReset()">ご縁をお清めする</button>
        <p onclick="closeModal()" style="margin-top:25px; color:#ccc; font-size:0.8rem; cursor:pointer;">閉じる</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", authDomain: "coupleapp-30f82.firebaseapp.com", databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", projectId: "coupleapp-30f82", appId: "1:205261235219:web:38b93dde060e520cdecbe6" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myN = localStorage.getItem('en_me'), partnerN = localStorage.getItem('en_partner'), myColor = localStorage.getItem('en_color') || '--sango', room = "", correctPass = "", currentViewId = "";

    window.cleanInput = (el) => {
        let val = el.value; if (!val) return;
        val = val.replace(/[ぁ-ん]/g, (s) => String.fromCharCode(s.charCodeAt(0) + 0x60));
        val = val.replace(/[^ァ-ンヴー]/g, ''); el.value = val.trim();
    };

    function showView(id) {
        currentViewId = id;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        const exitBtn = document.getElementById('exit');
        exitBtn.style.display = (id === 'setup-view') ? 'none' : 'block';
        exitBtn.innerText = (id === 'chat-view') ? '退出' : '戻る';
        
        document.getElementById('gear').style.display = (id === 'chat-view') ? 'block' : 'none';

        // ニュアンスの切り替え
        if (id === 'match-view') {
            const isReturn = localStorage.getItem('en_hasEntered'); // 一度でも入ったことがあるか
            document.getElementById('match-icon').innerText = isReturn ? "🤝" : "✨";
            document.getElementById('match-text').innerText = isReturn ? "ご縁が結ばれています" : "ご縁が結ばれました";
        }
    }

    window.onload = () => { if (myN && partnerN) startSync(); else showView('setup-view'); updateColorUI(); };

    window.startMatching = async () => {
        const n1 = document.getElementById('myName').value.trim();
        const n2 = document.getElementById('crushName').value.trim();
        if (!n1 || !n2) return;
        myN = n1; partnerN = n2; room = [myN, partnerN].sort().join('_');
        localStorage.setItem('en_me', myN); localStorage.setItem('en_partner', partnerN);
        await update(ref(db, `matching/${room}/${myN}`), { active: true, color: myColor });
        startSync();
    };

    function startSync() {
        room = [myN, partnerN].sort().join('_');
        onValue(ref(db, `matching/${room}`), (snap) => {
            const data = snap.val() || {};
            if (!data[myN] || !data[myN].active) { localStorage.clear(); location.reload(); return; }
            correctPass = (data.pass || "").trim();
            const isMatch = (data[myN]?.active && data[partnerN]?.active);
            
            if (localStorage.getItem('en_chatActive')) {
                if (isMatch) { showView('chat-view'); initChat(); }
                else { localStorage.removeItem('en_chatActive'); showView('waiting-view'); }
            } else {
                if (isMatch) {
                    document.getElementById('pass-auth-area').style.display = correctPass ? 'block' : 'none';
                    showView('match-view');
                } else { showView('waiting-view'); }
            }
        });
    }

    window.attemptEntry = () => {
        if (correctPass && document.getElementById('authPass').value.trim() !== correctPass) { alert("合言葉が違います"); return; }
        localStorage.setItem('en_chatActive', 'true');
        localStorage.setItem('en_hasEntered', 'true'); // 入室フラグをセット
        showView('chat-view'); initChat();
    };

    function initChat() {
        onValue(ref(db, `matching/${room}`), (mSnap) => {
            const mData = mSnap.val() || {};
            onValue(ref(db, 'chats/' + room), (snap) => {
                const area = document.getElementById('chat-area'); area.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val(), isMe = (d.s === myN), sColor = mData[d.s]?.color || '--sango';
                    const row = document.createElement('div'); row.className = `msg-row ${isMe ? 'me' : 'you'}`;
                    const m = document.createElement('div'); m.className = `msg ${isMe ? 'me' : 'you'}`;
                    m.style.background = `var(${sColor})`; m.innerText = d.t;
                    row.appendChild(m); area.appendChild(row);
                });
                area.scrollTop = area.scrollHeight;
            });
        }, { onlyOnce: true });
    }

    window.sendMsg = () => {
        const i = document.getElementById('chatInput'); if (!i.value.trim()) return;
        push(ref(db, 'chats/' + room), { s: myN, t: i.value }); i.value = "";
    };

    window.handleExit = () => {
        if (currentViewId === 'chat-view') {
            localStorage.removeItem('en_chatActive');
            location.reload(); 
        } else {
            localStorage.clear(); // 完全に最初から
            location.reload();
        }
    };

    window.saveSettings = async () => {
        const updates = {}; const p = document.getElementById('newPass').value.trim();
        if (p) updates['pass'] = p;
        updates[`${myN}/color`] = myColor;
        await update(ref(db, `matching/${room}`), updates);
        closeModal();
    };

    window.selectColor = (c) => { myColor = c; localStorage.setItem('en_color', c); updateColorUI(); };
    function updateColorUI() {
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('c-' + myColor.replace('--', ''));
        if(btn) btn.classList.add('active');
    }
    window.openModal = () => { document.getElementById('newPass').value = correctPass; document.getElementById('settingsModal').style.display = 'flex'; };
    window.closeModal = () => document.getElementById('settingsModal').style.display = 'none';
    
    window.fullReset = async () => {
        if(confirm("すべてをお清めしますか？")) {
            await remove(ref(db, `chats/${room}`)); await remove(ref(db, `matching/${room}`));
            localStorage.clear(); location.reload();
        }
    };
</script>
</body>
</html>
