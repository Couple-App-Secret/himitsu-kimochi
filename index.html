<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>縁結び</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap');

        :root { --sakura: #f4a7b9; --gold: #d4af37; --text: #4a2535; --muted: #a38b96; --bg: #fffafb; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Zen Maru Gothic', sans-serif; color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* 初期画面デザイン */
        .container { flex: 1; display: flex; flex-direction: column; padding: 20px; padding-top: env(safe-area-inset-top); max-width: 450px; margin: 0 auto; width: 100%; }
        .card { background: white; border-radius: 35px; flex: 1; display: flex; flex-direction: column; padding: 30px 20px; box-shadow: 0 15px 50px rgba(194,88,122,0.08); position: relative; overflow: hidden; border: 1px solid #fdf0f3; }
        
        .header { text-align: center; margin-bottom: 40px; position: relative; z-index: 10; }
        h1 { font-size: 1.5rem; color: var(--sakura); letter-spacing: 0.6em; text-indent: 0.6em; font-weight: 700; }
        .update-tag { font-size: 0.5rem; color: #eee; margin-top: 5px; display: block; }

        .step { display: none; height: 100%; flex-direction: column; z-index: 5; }
        .step.active { display: flex; }

        /* フォーム系 */
        .input-group { margin-top: auto; margin-bottom: auto; }
        input[type="text"] { width: 100%; padding: 18px; border: 1px solid #f8f8f8; border-radius: 20px; font-size: 1rem; margin-bottom: 15px; background: #fafafa; outline: none; transition: 0.3s; text-align: center; }
        input[type="text"]:focus { border-color: var(--sakura); background: #fff; }
        .btn { width: 100%; padding: 18px; background: var(--sakura); color: white; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(244,167,185,0.3); }
        .btn:disabled { background: #f0f0f0; color: #ccc; box-shadow: none; }

        /* 成就・桜 */
        .shoji-text { font-family: 'Yuji Syuku', serif; font-size: 5rem; color: var(--gold); text-align: center; margin-top: auto; margin-bottom: 20px; }
        .sakura-fall { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .petal { position: absolute; background: var(--sakura); border-radius: 150% 0 150% 0; opacity: 0.6; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }

        /* チャット */
        #chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px 0; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 22px; font-size: 0.95rem; line-height: 1.5; }
        .msg.me { align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.you { align-self: flex-start; border-bottom-left-radius: 4px; }

        /* カラー設定 */
        .color-sakura { background: #f4a7b9; color: white; }
        .color-blue { background: #8ecae6; color: white; }
        .color-gold { background: #d4af37; color: white; }
        .color-white { background: white; color: var(--text); border: 1px solid #eee; }

        .settings-btn { position: absolute; top: 25px; right: 25px; font-size: 1.3rem; cursor: pointer; color: #eee; z-index: 20; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(74,37,53,0.2); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; display: inline-block; margin: 8px; cursor: pointer; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="settingsModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <p style="font-size:0.8rem; color:var(--muted); margin-bottom:15px;">吹き出しの色</p>
            <div onclick="updateColor('sakura')" class="color-dot" style="background:#f4a7b9;"></div>
            <div onclick="updateColor('blue')" class="color-dot" style="background:#8ecae6;"></div>
            <div onclick="updateColor('gold')" class="color-dot" style="background:#d4af37;"></div>
            <div onclick="updateColor('white')" class="color-dot" style="background:#ffffff; border-color:#eee;"></div>
            <div style="margin:20px 0; border-top:1px solid #f5f5f5;"></div>
            <input type="text" id="newPass" placeholder="合言葉を新しく決める" style="font-size:0.8rem; padding:12px;">
            <button class="btn" onclick="savePass()" style="padding:12px; font-size:0.8rem; margin-bottom:10px;">合言葉を保存</button>
            <button class="btn" style="background:#ff9999; padding:12px; font-size:0.8rem;" onclick="fullReset()">ご縁をリセット</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div id="sakura-container" class="sakura-fall"></div>
            <div class="header">
                <h1>縁結び</h1>
                <span class="update-tag">Ver. 2026-0420-20:00</span>
                <div id="gear" class="settings-btn" style="display:none;" onclick="document.getElementById('settingsModal').style.display='flex'">⚙</div>
            </div>

            <div id="step0" class="step active">
                <div class="input-group">
                    <input type="text" id="myName" placeholder="自分の名前" oninput="checkInput()">
                    <input type="text" id="crushName" placeholder="相手の名前" oninput="checkInput()">
                    <button id="submitBtn" class="btn" onclick="sendFeeling()" disabled>想いをおくる</button>
                </div>
                <p style="font-size:0.7rem; color:var(--muted); text-align:center; margin-top:20px;">名前が一致すると成就します</p>
            </div>

            <div id="step-waiting" class="step">
                <div style="text-align:center; margin: auto;">
                    <div style="font-size:3rem; margin-bottom:20px; animation: pulse 2s infinite;">💌</div>
                    <p style="color:var(--muted); font-size:0.9rem; letter-spacing:0.1em;">お相手を待っています...</p>
                    <p style="color:#ddd; font-size:0.7rem; margin-top:40px; cursor:pointer;" onclick="cancelFeeling()">一度とりけす</p>
                </div>
            </div>

            <div id="step-achieved" class="step">
                <div class="shoji-text">成就</div>
                <p style="text-align:center; color:var(--muted); margin-bottom:40px; letter-spacing:0.2em;">ご縁が結ばれました</p>
                <button class="btn" onclick="checkPassNeeded()">二人の場所へ</button>
            </div>

            <div id="step-verify" class="step">
                <div class="input-group">
                    <p style="font-size:0.8rem; color:var(--muted); text-align:center; margin-bottom:20px;">約束の合言葉は？</p>
                    <input type="text" id="passInput" placeholder="合言葉を入力">
                    <button class="btn" onclick="verifyPass()">確認</button>
                </div>
            </div>

            <div id="step-chat" class="step">
                <div id="chat-area"></div>
                <div style="display:flex; gap:10px; padding-top:15px; background:white; z-index:10;">
                    <input type="text" id="chatInput" placeholder="ふたりの会話..." style="margin:0; text-align:left; flex:1;">
                    <button onclick="sendMsg()" style="background:var(--sakura); border:none; color:white; width:55px; border-radius:20px; font-size:1.2rem;">▶</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, serverTimestamp, update, remove, get, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", authDomain: "coupleapp-30f82.firebaseapp.com", databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", projectId: "coupleapp-30f82", appId: "1:205261235219:web:38b93dde060e520cdecbe6" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myName = localStorage.getItem('enmusubi_myName') || "";
    let partnerName = localStorage.getItem('enmusubi_partnerName') || "";
    let roomPath = (myName && partnerName) ? [myName, partnerName].sort().join('_') : "";
    let roomInfo = {};

    window.onload = () => { if (roomPath) syncRoom(); };

    function showStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // リアルタイムで部屋の状態を監視（相手のリセットを検知）
    function syncRoom() {
        onValue(ref(db, 'rooms/' + roomPath), (snap) => {
            if (!snap.exists()) {
                // 部屋が消えた（相手がリセットした）ら自分も初期化
                localStorage.clear();
                location.reload();
                return;
            }
            roomInfo = snap.val();
            if (roomInfo.status === 'achieved' && !document.getElementById('step-chat').classList.contains('active')) {
                showStep('step-achieved');
                startSakura();
            }
        });
    }

    window.checkInput = () => {
        const v1 = document.getElementById('myName').value.trim();
        const v2 = document.getElementById('crushName').value.trim();
        document.getElementById('submitBtn').disabled = !(v1 && v2);
    };

    window.sendFeeling = async () => {
        myName = document.getElementById('myName').value.trim();
        partnerName = document.getElementById('crushName').value.trim();
        roomPath = [myName, partnerName].sort().join('_');
        
        localStorage.setItem('enmusubi_myName', myName);
        localStorage.setItem('enmusubi_partnerName', partnerName);

        showStep('step-waiting');
        await set(ref(db, 'feelings/' + myName), { crush: partnerName });
        
        // 相手の想いを監視
        onValue(ref(db, 'feelings/' + partnerName), (snap) => {
            if (snap.exists() && snap.val().crush === myName) {
                achieve();
            }
        });
    };

    window.cancelFeeling = async () => {
        await remove(ref(db, 'feelings/' + myName));
        localStorage.clear();
        location.reload();
    };

    async function achieve() {
        await update(ref(db, 'rooms/' + roomPath), { status: 'achieved' });
        await remove(ref(db, 'feelings/' + myName));
        syncRoom();
    }

    window.checkPassNeeded = () => {
        if (roomInfo.pass) showStep('step-verify');
        else startChat();
    };

    window.verifyPass = () => {
        if (document.getElementById('passInput').value === roomInfo.pass) startChat();
        else alert("合言葉が違います");
    };

    window.startChat = () => {
        showStep('step-chat');
        document.getElementById('gear').style.display = 'block';
        onValue(ref(db, 'chats/' + roomPath), (snap) => {
            const area = document.getElementById('chat-area');
            area.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const col = roomInfo[d.sender] || 'white';
                const m = document.createElement('div');
                m.className = `msg ${d.sender === myName ? 'me' : 'you'} color-${col}`;
                m.innerText = d.text;
                area.appendChild(m);
            });
            area.scrollTop = area.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chatInput');
        if (!i.value.trim()) return;
        await push(ref(db, 'chats/' + roomPath), { sender: myName, text: i.value });
        i.value = "";
    };

    window.updateColor = async (c) => {
        await update(ref(db, 'rooms/' + roomPath), { [myName]: c });
        document.getElementById('settingsModal').style.display = 'none';
    };

    window.savePass = async () => {
        const p = document.getElementById('newPass').value.trim();
        if (p) {
            await update(ref(db, 'rooms/' + roomPath), { pass: p });
            alert("合言葉を保存しました");
            document.getElementById('newPass').value = "";
        }
    };

    window.fullReset = async () => {
        if(confirm("すべてをリセットします。お相手の画面も初期状態に戻りますがよろしいですか？")){
            off(ref(db, 'rooms/' + roomPath)); // 監視を止める
            await remove(ref(db, 'rooms/' + roomPath));
            await remove(ref(db, 'chats/' + roomPath));
            localStorage.clear();
            location.reload();
        }
    };

    function startSakura() {
        const container = document.getElementById('sakura-container');
        if(container.childElementCount > 0) return;
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = (Math.random() * 8 + 6) + 'px';
            p.style.animationDuration = (Math.random() * 3 + 2) + 's';
            p.style.animationDelay = (Math.random() * 2) + 's';
            container.appendChild(p);
        }
    }
</script>
</body>
</html>
