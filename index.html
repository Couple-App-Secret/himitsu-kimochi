<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ひみつのきもち</title>

    <link rel="apple-touch-icon" href="https://Couple-App-Secret.github.io/himitsu-kimochi/icon.png">
    <link rel="icon" href="https://Couple-App-Secret.github.io/himitsu-kimochi/icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="縁結び">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');
        
        :root {
            --pink: #f4a7b9;
            --deep: #c2587a;
            --cream: #fff0f5;
            --text: #4a2535;
            --muted: #a38b96;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 360px; }

        .card {
            background: white;
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(194,88,122,0.1);
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--deep);
            margin-bottom: 5px;
            letter-spacing: 0.1em;
        }

        .subtitle { font-size: 0.8rem; color: var(--muted); margin-bottom: 35px; }

        .label { font-size: 0.9rem; font-weight: 700; display: block; margin-bottom: 8px; text-align: left; padding-left: 5px; }

        input[type="text"] {
            width: 100%; padding: 15px; border: 2px solid #f0f0f0; border-radius: 15px;
            font-size: 1rem; margin-bottom: 25px; transition: 0.3s; background: #fafafa;
        }
        input:focus { border-color: var(--pink); outline: none; background: white; }

        .btn {
            width: 100%; padding: 18px; background: var(--pink); color: white;
            border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 5px 15px rgba(244,167,185,0.4);
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.98); }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .heart-anim { font-size: 4rem; display: block; margin-bottom: 20px; animation: heartbeat 1.2s infinite; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .name-chip {
            display: inline-block; background: var(--cream); color: var(--deep);
            padding: 5px 15px; border-radius: 20px; font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>SECRET</h1>
            <p class="subtitle">二人の気持ちを重ねます</p>

            <div class="step active" id="step0">
                <span class="label">あなたの名前（カタカナ）</span>
                <input type="text" id="myName" placeholder="例：タロウ" maxlength="20">
                <span class="label">相手の名前（カタカナ）</span>
                <input type="text" id="crushName" placeholder="例：ハナコ" maxlength="20">
                <button class="btn" onclick="submitFeeling()">気持ちをおくる</button>
            </div>

            <div class="step" id="step1">
                <span class="heart-anim">⏳</span>
                <p style="font-weight:700;">相手を待っています...</p>
                <p class="subtitle" style="margin-top:10px;">相手も入力すると画面が変わります</p>
            </div>

            <div class="step" id="step2">
                <span class="heart-anim">💖</span>
                <h2 style="color:var(--deep); margin-bottom:15px;">結ばれました！</h2>
                <div style="margin-bottom:20px;">
                    <span class="name-chip" id="resMe"></span>
                    <span style="margin:0 5px;">&</span>
                    <span class="name-chip" id="resYou"></span>
                </div>
                <p class="subtitle">二人の想いがつながりました</p>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8",
        authDomain: "coupleapp-30f82.firebaseapp.com",
        databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com",
        projectId: "coupleapp-30f82",
        storageBucket: "coupleapp-30f82.firebasestorage.app",
        messagingSenderId: "205261235219",
        appId: "1:205261235219:web:38b93dde060e520cdecbe6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function goTo(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function normalize(s) {
        return s.trim().replace(/\s+/g, '').toLowerCase();
    }

    window.submitFeeling = async function() {
        const myName = document.getElementById('myName').value.trim();
        const crushName = document.getElementById('crushName').value.trim();
        if (!myName || !crushName) { alert('名前を入力してください'); return; }

        const myKey = normalize(myName);
        const crushKey = normalize(crushName);

        try {
            await set(ref(db, 'feelings/' + myKey), {
                name: myName,
                crushKey: crushKey,
                timestamp: Date.now()
            });
            goTo(1);
            
            const crushRef = ref(db, 'feelings/' + crushKey);
            onValue(crushRef, (snap) => {
                if (snap.exists() && snap.val().crushKey === myKey) {
                    document.getElementById('resMe').innerText = myName;
                    document.getElementById('resYou').innerText = snap.val().name;
                    goTo(2);
                }
            });
        } catch(e) { alert('通信エラーが発生しました'); }
    }
</script>
</body>
</html>
