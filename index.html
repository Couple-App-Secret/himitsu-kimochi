<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ひみつのきもち</title>

    <link rel="apple-touch-icon" href="https://Couple-App-Secret.github.io/himitsu-kimochi/icon.png">
    <link rel="icon" href="https://Couple-App-Secret.github.io/himitsu-kimochi/icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="縁結び">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Shippori+Mincho:wght@400;600&display=swap');
        
        :root {
            --main-blue: #1e3a8a; /* 組紐の青 */
            --main-red: #b91c1c;  /* 組紐の赤 */
            --cream: #fdfaf7;
            --text: #2d1a12;
            --muted: #8c7b75;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* 桜の花びらアニメーション */
        .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .petal {
            position: absolute; border-radius: 0 50% 50% 50%; opacity: 0;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .container { position: relative; z-index: 1; width: 100%; max-width: 380px; }

        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 24px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
            text-align: center;
        }

        h1 {
            font-family: 'Shippori Mincho', serif;
            font-size: 1.6rem;
            color: var(--main-blue);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .subtitle { font-size: 0.8rem; color: var(--muted); margin-bottom: 30px; }

        .how-box {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
            border: 1px solid #edf2f7;
        }

        .how-step {
            display: flex; gap: 12px; margin-bottom: 12px;
            font-size: 0.85rem; line-height: 1.6; color: var(--text);
        }
        .how-num {
            background: var(--main-blue); color: white; border-radius: 50%;
            width: 22px; height: 22px; display: flex; align-items: center;
            justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
        }

        .label { font-size: 0.9rem; font-weight: 700; display: block; margin-bottom: 8px; text-align: left; padding-left: 4px; }

        input[type="text"] {
            width: 100%; padding: 16px; border: 2px solid #eee; border-radius: 16px;
            font-size: 1rem; margin-bottom: 20px; transition: 0.3s; background: #fafafa;
        }
        input:focus { border-color: var(--main-blue); outline: none; background: white; }

        .btn {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, var(--main-blue), var(--main-red));
            color: white; border: none; border-radius: 16px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px rgba(30,58,138,0.2);
        }
        .btn:disabled { opacity: 0.5; }

        /* ステップ管理 */
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 結果表示 */
        .result-wrap { padding: 20px 0; }
        .heart-anim { font-size: 4.5rem; animation: heartbeat 0.8s infinite alternate; display: block; margin-bottom: 20px; }
        @keyframes heartbeat { from { transform: scale(1); } to { transform: scale(1.15); } }
        .name-chip {
            background: white; border: 2px solid var(--main-blue); color: var(--main-blue);
            padding: 8px 20px; border-radius: 30px; font-weight: 700; font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="petals" id="petals"></div>
    <div class="container">
        <div class="card">
            <h1>SECRET</h1>
            <p class="subtitle">二人の気持ちを、組紐で結びます</p>

            <div class="step active" id="step0">
                <div class="how-box">
                    <div class="how-step"><span class="how-num">1</span>あなたの名前を入力</div>
                    <div class="how-step"><span class="how-num">2</span>好きな人の名前を入力</div>
                    <div class="how-step"><span class="how-num">3</span>お互いが入力していれば「結ばれます」</div>
                </div>
                <span class="label">あなたの名前</span>
                <input type="text" id="myName" placeholder="例：文吾" maxlength="20">
                <span class="label">好きな人の名前</span>
                <input type="text" id="crushName" placeholder="例：ハナ" maxlength="20">
                <button class="btn" id="submitBtn" onclick="submitFeeling()">気持ちを結ぶ 💌</button>
            </div>

            <div class="step" id="step1">
                <div class="result-wrap">
                    <span class="heart-anim" style="animation: none;">⏳</span>
                    <p style="font-weight:700; color:var(--main-blue);">相手を待っています...</p>
                    <p class="subtitle">相手が入力すると、この画面が切り替わります</p>
                </div>
            </div>

            <div class="step" id="step2">
                <div id="resultInner"></div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8",
        authDomain: "coupleapp-30f82.firebaseapp.com",
        databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com",
        projectId: "coupleapp-30f82",
        storageBucket: "coupleapp-30f82.firebasestorage.app",
        messagingSenderId: "205261235219",
        appId: "1:205261235219:web:38b93dde060e520cdecbe6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 桜
    const petalEl = document.getElementById('petals');
    for (let i = 0; i < 16; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = ['#f4a7b9','#ffd6e0','#ffb3c6'][Math.floor(Math.random()*3)];
        const s = 6 + Math.random() * 10;
        p.style.width = s + 'px'; p.style.height = s + 'px';
        p.style.animationDuration = (5 + Math.random() * 6) + 's';
        p.style.animationDelay = (Math.random() * 8) + 's';
        petalEl.appendChild(p);
    }

    let state = { myName: '', crushName: '', unsubscribe: null };

    function goTo(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function normalize(s) {
        return (s || '').trim().replace(/\s+/g, '').toLowerCase();
    }

    window.submitFeeling = async function() {
        const myName = document.getElementById('myName').value.trim();
        const crushName = document.getElementById('crushName').value.trim();
        if (!myName || !crushName) { alert('名前を入力してください'); return; }

        state.myName = myName;
        state.crushName = crushName;
        const myKey = normalize(myName);
        const crushKey = normalize(crushName);

        try {
            await set(ref(db, 'feelings/' + myKey), {
                name: myName,
                crushKey: crushKey,
                timestamp: Date.now()
            });
            goTo(1);
            listenForMatch(myKey, crushKey);
        } catch(e) { alert('エラーが発生しました'); }
    }

    function listenForMatch(myKey, crushKey) {
        const crushRef = ref(db, 'feelings/' + crushKey);
        onValue(crushRef, (snap) => {
            if (snap.exists() && snap.val().crushKey === myKey) {
                showResult(state.myName, snap.val().name);
            }
        });
    }

    function showResult(me, you) {
        document.getElementById('resultInner').innerHTML = `
            <div class="result-wrap">
                <span class="heart-anim">💖</span>
                <h2 style="font-family:'Shippori Mincho'; color:var(--main-red);">結ばれました</h2>
                <div style="margin:25px 0; display:flex; align-items:center; justify-content:center; gap:10px;">
                    <span class="name-chip">${me}</span>
                    <span>∞</span>
                    <span class="name-chip">${you}</span>
                </div>
                <p class="subtitle">二人の気持ちがつながりました！</p>
                <button class="btn" onclick="location.reload()" style="background:var(--muted); margin-top:20px;">閉じる</button>
            </div>
        `;
        goTo(2);
    }
</script>
</body>
</html>
