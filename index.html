<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>縁結びのお守り</title>
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Couple-App-Secret/himitsu-kimochi/main/icon.PNG">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Couple-App-Secret/himitsu-kimochi/main/icon.PNG">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');
        :root { 
            --main-bg: #FFFFFF;
            --sub-bg: #F8F9FA;
            --accent-blue: #7092BE; /* 少しグレーの混じった落ち着いた青 */
            --accent-sage: #8DA399; /* ニュートラルなセージグリーン */
            --soft-text: #555555;
            --border-light: #E9ECEF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            height: 100dvh; 
            background: var(--main-bg); 
            font-family: 'Zen Maru Gothic', sans-serif; 
            color: var(--soft-text); 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
        }
        .app-container { display: flex; flex-direction: column; height: 100%; }
        
        .header { 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: white; 
            border-bottom: 1px solid var(--border-light); 
            z-index: 100; 
            position: relative; 
        }
        h1 { 
            font-size: 0.95rem; 
            color: var(--accent-blue);
            letter-spacing: 0.1em; 
            font-weight: bold; 
        }

        .exit-btn { position: absolute; left: 15px; font-size: 0.8rem; color: #bbb; padding: 10px; cursor: pointer; }
        .settings-trigger { position: absolute; right: 15px; font-size: 1.2rem; color: #ddd; padding: 10px; cursor: pointer; }
        
        .view { display: none; flex: 1; flex-direction: column; position: relative; overflow: hidden; padding: 0 40px; align-items: center; justify-content: center; text-align: center; }
        .view.active { display: flex; }
        
        /* 入力欄：シンプルに、清潔感重視 */
        input[type="text"] { 
            width: 100%; 
            max-width: 280px; 
            padding: 14px; 
            border: 1px solid var(--border-light); 
            border-radius: 10px;
            margin-bottom: 15px; 
            text-align: center; 
            font-size: 16px; 
            outline: none; 
            background: var(--sub-bg); 
            color: var(--soft-text);
        }
        input[type="text"]::placeholder { color: #ccc; }

        .info-txt { font-size: 0.8rem; color: #aaa; margin-bottom: 15px; letter-spacing: 0.02em; }
        
        .system-msg { 
            background: var(--sub-bg); 
            border-radius: 12px; 
            padding: 20px; 
            font-size: 0.85rem; 
            margin: 20px; 
            line-height: 1.8; 
            color: #777; 
        }
        
        #chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; width: 100%; }
        .msg-row { display: flex; flex-direction: column; max-width: 80%; margin-bottom: 8px; }
        .msg-row.me { align-self: flex-end; align-items: flex-end; }
        .msg-row.you { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 10px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.5; word-break: break-all; }
        .msg.me { background: var(--accent-blue); color: white; border-bottom-right-radius: 2px; }
        .msg.you { background: #E9ECEF; color: var(--soft-text); border-bottom-left-radius: 2px; }
        
        .input-wrap { 
            padding: 12px; 
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); 
            background: white; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid var(--border-light);
            width: 100%;
        }
        #chatInput { 
            flex: 1; 
            padding: 12px 18px; 
            border: none; 
            border-radius: 20px; 
            background: var(--sub-bg); 
            font-size: 16px; 
            outline: none; 
        }
        .send-btn { 
            background: var(--accent-blue); 
            color: white; 
            border: none; 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
        }
        
        /* ボタンをすっきり、細身に */
        .btn { 
            width: 100%; 
            max-width: 280px; 
            padding: 14px; 
            background: var(--accent-blue); 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-weight: bold; 
            font-size: 0.95rem; 
            letter-spacing: 0.1em;
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }
        
        .color-pnl { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .c-btn { width: 38px; height: 38px; border-radius: 50%; border: 2px solid transparent; }
        .c-btn.active { border-color: #555; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div id="exit" class="exit-btn" style="display:none;" onclick="handleExit()">戻る</div>
        <h1>縁結びのお守り</h1>
        <div id="gear" class="settings-trigger" style="display:none;" onclick="openModal()">⚙</div>
    </div>

    <div id="setup-view" class="view active">
        <p class="info-txt">お名前をカタカナで入力してください</p>
        <input type="text" id="myName" placeholder="あなた" onchange="cleanInput(this)" onblur="cleanInput(this)">
        <input type="text" id="crushName" placeholder="お相手" onchange="cleanInput(this)" onblur="cleanInput(this)">
        <button class="btn" onclick="startMatching()">ご縁を願う</button>
    </div>

    <div id="waiting-view" class="view">
        <div style="font-size:2.5rem; margin-bottom:20px; opacity: 0.6;">✉️</div>
        <p style="color:#999; font-size:0.9rem;">お相手の願いを待っています</p>
        <p style="color:#ccc; font-size:0.75rem; margin-top:10px;">二人の想いが重なると扉が開きます</p>
    </div>

    <div id="match-view" class="view">
        <div style="font-size:2.5rem; margin-bottom:15px;">✨</div>
        <p style="font-weight:bold; margin-bottom:20px; color:var(--accent-blue);">ご縁が結ばれました</p>
        <div id="pass-auth-area" style="display:none; width:100%; margin-bottom:20px;">
            <input type="text" id="authPass" placeholder="合言葉を入力">
        </div>
        <button class="btn" onclick="attemptEntry()">はじめる</button>
    </div>

    <div id="chat-view" class="view" style="padding:0;">
        <div id="chat-area"></div>
        <div class="input-wrap">
            <input type="text" id="chatInput" placeholder="メッセージ..." autocomplete="off">
            <button class="send-btn" onclick="sendMsg()">▶</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <p style="font-size:0.9rem; margin-bottom:15px;">設定</p>
        <div class="color-pnl">
            <div class="c-btn" id="c-blue" style="background:#7092BE;" onclick="selectColor('--accent-blue')"></div>
            <div class="c-btn" id="c-sage" style="background:#8DA399;" onclick="selectColor('--accent-sage')"></div>
            <div class="c-btn" id="c-gray" style="background:#6C757D;" onclick="selectColor('#6C757D')"></div>
        </div>
        <input type="text" id="newPass" placeholder="入室の合言葉を決める">
        <button class="btn" onclick="saveSettings()">保存</button>
        <button class="btn" style="background:#E9ECEF; color:#666; margin-top:10px; font-size:0.75rem;" onclick="fullReset()">履歴をすべて消去する</button>
        <p onclick="closeModal()" style="margin-top:20px; color:#ccc; font-size:0.8rem; cursor:pointer;">閉じる</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", authDomain: "coupleapp-30f82.firebaseapp.com", databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", projectId: "coupleapp-30f82", appId: "1:205261235219:web:38b93dde060e520cdecbe6" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myN = localStorage.getItem('en_me'), partnerN = localStorage.getItem('en_partner'), myColor = localStorage.getItem('en_color') || '--accent-blue', room = "", correctPass = "", currentViewId = "";

    window.cleanInput = (el) => {
        let val = el.value;
        if (!val) return;
        val = val.replace(/[ぁ-ん]/g, (s) => String.fromCharCode(s.charCodeAt(0) + 0x60));
        val = val.replace(/[^ァ-ンヴー]/g, '');
        el.value = val.trim();
    };

    function showView(id) {
        currentViewId = id;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const exitBtn = document.getElementById('exit');
        exitBtn.style.display = (id === 'setup-view') ? 'none' : 'block';
        document.getElementById('gear').style.display = (id === 'chat-view') ? 'block' : 'none';
    }

    window.onload = () => { if (myN && partnerN) startSync(); else showView('setup-view'); updateColorUI(); };

    window.startMatching = async () => {
        const n1 = document.getElementById('myName').value.trim();
        const n2 = document.getElementById('crushName').value.trim();
        if (!n1 || !n2) return;
        myN = n1; partnerN = n2; room = [myN, partnerN].sort().join('_');
        localStorage.setItem('en_me', myN); localStorage.setItem('en_partner', partnerN);
        await update(ref(db, `matching/${room}/${myN}`), { active: true, color: myColor });
        startSync();
    };

    function startSync() {
        room = [myN, partnerN].sort().join('_');
        onValue(ref(db, `matching/${room}`), (snap) => {
            const data = snap.val() || {};
            if (!data[myN] || !data[myN].active) {
                 localStorage.clear();
                 document.getElementById('myName').value = "";
                 document.getElementById('crushName').value = "";
                 myN = ""; partnerN = "";
                 showView('setup-view'); 
                 return;
            }
            correctPass = (data.pass || "").trim();
            const isMatch = (data[myN] && data[myN].active && data[partnerN] && data[partnerN].active);

            if (localStorage.getItem('en_chatActive')) {
                if (isMatch) { showView('chat-view'); initChat(); }
                else { localStorage.removeItem('en_chatActive'); showView('waiting-view'); }
            } else {
                if (isMatch) {
                    document.getElementById('pass-auth-area').style.display = correctPass ? 'block' : 'none';
                    showView('match-view');
                } else {
                    showView('waiting-view');
                }
            }
        });
    }

    window.attemptEntry = () => {
        if (correctPass && document.getElementById('authPass').value.trim() !== correctPass) { alert("合言葉が違います"); return; }
        localStorage.setItem('en_chatActive', 'true');
        showView('chat-view');
        initChat();
    };

    function initChat() {
        onValue(ref(db, `matching/${room}`), (mSnap) => {
            const mData = mSnap.val() || {};
            if (!mData[myN]) return;
            onValue(ref(db, 'chats/' + room), (snap) => {
                const area = document.getElementById('chat-area');
                area.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val(), isMe = (d.s === myN), sColor = mData[d.s]?.color || '--accent-blue';
                    const row = document.createElement('div'); row.className = `msg-row ${isMe ? 'me' : 'you'}`;
                    const m = document.createElement('div'); m.className = `msg ${isMe ? 'me' : 'you'}`;
                    if(isMe){
                        m.style.background = sColor.startsWith('--') ? `var(${sColor})` : sColor;
                    }
                    m.innerText = d.t;
                    row.appendChild(m); area.appendChild(row);
                });
                area.scrollTop = area.scrollHeight;
            });
        }, { onlyOnce: true });
    }

    window.sendMsg = () => {
        const i = document.getElementById('chatInput'); if (!i.value.trim()) return;
        push(ref(db, 'chats/' + room), { s: myN, t: i.value }); i.value = "";
    };

    window.handleExit = () => {
        if (currentViewId === 'chat-view') localStorage.removeItem('en_chatActive');
        else { localStorage.removeItem('en_me'); localStorage.removeItem('en_partner'); }
        location.reload();
    };

    window.saveSettings = async () => {
        const updates = {}; const p = document.getElementById('newPass').value.trim();
        if (p) updates['pass'] = p;
        updates[`${myN}/color`] = myColor;
        await update(ref(db, `matching/${room}`), updates);
        closeModal();
    };

    window.selectColor = (c) => { myColor = c; localStorage.setItem('en_color', c); updateColorUI(); };
    function updateColorUI() {
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
        let targetId = myColor.replace('--', '').replace('#', '').replace('accent-', '');
        const activeBtn = document.getElementById('c-' + targetId);
        if(activeBtn) activeBtn.classList.add('active');
    }
    window.openModal = () => { document.getElementById('newPass').value = correctPass; document.getElementById('settingsModal').style.display = 'flex'; };
    window.closeModal = () => document.getElementById('settingsModal').style.display = 'none';
    
    window.fullReset = async () => {
        if(confirm("すべて消去しますか？")) {
            await remove(ref(db, `chats/${room}`));
            await remove(ref(db, `matching/${room}`));
            localStorage.clear();
            location.reload();
        }
    };
</script>
</body>
</html>
