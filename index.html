<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>縁結びのお守り</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Shippori+Mincho:wght@700&display=swap');
        
        :root { 
            --fuda-white: #FAF9F6;  /* 御札の白 */
            --himu-red: #B03A2E;   /* 結び紐の赤 */
            --kire-base: #E8E4D9;   /* 布地のベース */
            --kire-deep: #2F3E46;   /* 落ち着いた布地の濃色 */
            --text-ink: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            height: 100dvh; 
            background: var(--kire-base); 
            font-family: 'Zen Maru Gothic', sans-serif; 
            color: var(--text-ink); 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
            /* お守りの布地感を出すテクスチャ */
            background-image: 
                linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 3px 3px;
        }

        .app-container { 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
        }
        
        /* お守りの上部（紐を通す部分） */
        .omamori-top {
            height: 60px;
            background: var(--kire-deep);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .omamori-top::after {
            content: '×'; /* 紐の結び目イメージ */
            color: var(--himu-red);
            font-size: 24px;
            font-weight: bold;
        }

        /* お守りの中身（白い御札の部分） */
        .fuda-content { 
            flex: 1;
            margin: 15px 20px;
            background: var(--fuda-white);
            border-radius: 4px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border: 1px solid #ddd;
        }

        .fuda-header {
            padding: 25px 0 10px;
            text-align: center;
        }
        h1 { 
            font-family: 'Shippori Mincho', serif;
            font-size: 1.2rem; 
            color: var(--text-ink);
            letter-spacing: 0.4em; 
        }
        .mizuhiki {
            width: 60px;
            height: 1px;
            background: var(--himu-red);
            margin: 10px auto;
        }

        .view { display: none; flex: 1; flex-direction: column; padding: 20px; align-items: center; justify-content: center; text-align: center; }
        .view.active { display: flex; }
        
        input[type="text"] { 
            width: 100%; max-width: 240px; padding: 12px; 
            border: none; border-bottom: 1.5px solid var(--kire-base);
            border-radius: 0; margin-bottom: 25px; 
            text-align: center; font-size: 16px; outline: none; 
            background: transparent; font-family: 'Shippori Mincho', serif;
        }

        /* チャットエリア */
        #chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; width: 100%; background: #fff; }
        .msg-row { display: flex; flex-direction: column; max-width: 85%; margin-bottom: 12px; }
        .msg-row.me { align-self: flex-end; align-items: flex-end; }
        .msg-row.you { align-self: flex-start; align-items: flex-start; }
        .msg { padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; line-height: 1.5; border: 1px solid #eee; }
        .msg.me { background: #fdfaf5; color: var(--text-ink); border-right: 3px solid var(--himu-red); }
        .msg.you { background: #f5f7f8; color: var(--text-ink); border-left: 3px solid var(--kire-deep); }
        
        .input-wrap { 
            padding: 10px; display: flex; gap: 8px; 
            background: var(--fuda-white); border-top: 1px solid #eee;
        }
        #chatInput { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; outline: none; }
        .send-btn { background: var(--himu-red); color: white; border: none; width: 40px; height: 40px; border-radius: 4px; }
        
        .btn { 
            width: 100%; max-width: 240px; padding: 15px; 
            background: var(--kire-deep); color: white; border: none; 
            border-radius: 2px; font-size: 0.9rem; letter-spacing: 0.2em; font-family: 'Shippori Mincho', serif;
        }

        .settings-trigger { position: absolute; top: 10px; right: 10px; font-size: 1rem; color: #ccc; cursor: pointer; }
        .exit-btn { position: absolute; top: 10px; left: 10px; font-size: 0.7rem; color: #ccc; cursor: pointer; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; width: 85%; max-width: 300px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="omamori-top"></div>
    
    <div class="fuda-content">
        <div id="exit" class="exit-btn" style="display:none;" onclick="handleExit()">戻る</div>
        <div id="gear" class="settings-trigger" style="display:none;" onclick="openModal()">⚙</div>
        
        <div class="fuda-header">
            <h1>縁結びのお守り</h1>
            <div class="mizuhiki"></div>
        </div>

        <div id="setup-view" class="view active">
            <input type="text" id="myName" placeholder="御名前" onchange="cleanInput(this)" onblur="cleanInput(this)">
            <input type="text" id="crushName" placeholder="御相手" onchange="cleanInput(this)" onblur="cleanInput(this)">
            <button class="btn" onclick="startMatching()">願いを記す</button>
        </div>

        <div id="waiting-view" class="view">
            <p style="color:#999; font-size:0.85rem; letter-spacing:0.1em;">御相手を待っています</p>
        </div>

        <div id="match-view" class="view">
            <p style="font-weight:bold; color:var(--himu-red); margin-bottom:20px;">ご縁が結ばれました</p>
            <div id="pass-auth-area" style="display:none; width:100%; margin-bottom:20px;">
                <input type="text" id="authPass" placeholder="合言葉">
            </div>
            <button class="btn" onclick="attemptEntry()">扉をひらく</button>
        </div>

        <div id="chat-view" class="view" style="padding:0; justify-content:flex-start;">
            <div id="chat-area"></div>
            <div class="input-wrap">
                <input type="text" id="chatInput" placeholder="筆を執る..." autocomplete="off">
                <button class="send-btn" onclick="sendMsg()">▶</button>
            </div>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <p style="margin-bottom:20px; font-family: 'Shippori Mincho', serif;">お清めと合言葉</p>
        <input type="text" id="newPass" placeholder="入室の合言葉">
        <button class="btn" onclick="saveSettings()">保存</button>
        <button class="btn" style="background:#eee; color:#999; margin-top:10px;" onclick="fullReset()">お清め（消去）</button>
        <p onclick="closeModal()" style="margin-top:20px; color:#ccc; font-size:0.8rem; cursor:pointer;">閉じる</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", authDomain: "coupleapp-30f82.firebaseapp.com", databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", projectId: "coupleapp-30f82", appId: "1:205261235219:web:38b93dde060e520cdecbe6" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myN = localStorage.getItem('en_me'), partnerN = localStorage.getItem('en_partner'), room = "", correctPass = "", currentViewId = "";

    window.cleanInput = (el) => {
        let val = el.value;
        if (!val) return;
        val = val.replace(/[ぁ-ん]/g, (s) => String.fromCharCode(s.charCodeAt(0) + 0x60));
        val = val.replace(/[^ァ-ンヴー]/g, '');
        el.value = val.trim();
    };

    function showView(id) {
        currentViewId = id;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('exit').style.display = (id === 'setup-view') ? 'none' : 'block';
        document.getElementById('gear').style.display = (id === 'chat-view') ? 'block' : 'none';
    }

    window.onload = () => { if (myN && partnerN) startSync(); else showView('setup-view'); };

    window.startMatching = async () => {
        const n1 = document.getElementById('myName').value.trim();
        const n2 = document.getElementById('crushName').value.trim();
        if (!n1 || !n2) return;
        myN = n1; partnerN = n2; room = [myN, partnerN].sort().join('_');
        localStorage.setItem('en_me', myN); localStorage.setItem('en_partner', partnerN);
        await update(ref(db, `matching/${room}/${myN}`), { active: true });
        startSync();
    };

    function startSync() {
        room = [myN, partnerN].sort().join('_');
        onValue(ref(db, `matching/${room}`), (snap) => {
            const data = snap.val() || {};
            if (!data[myN] || !data[myN].active) {
                 localStorage.clear(); location.reload(); return;
            }
            correctPass = (data.pass || "").trim();
            const isMatch = (data[myN] && data[myN].active && data[partnerN] && data[partnerN].active);

            if (localStorage.getItem('en_chatActive')) {
                if (isMatch) { showView('chat-view'); initChat(); }
                else { localStorage.removeItem('en_chatActive'); showView('waiting-view'); }
            } else {
                if (isMatch) {
                    document.getElementById('pass-auth-area').style.display = correctPass ? 'block' : 'none';
                    showView('match-view');
                } else { showView('waiting-view'); }
            }
        });
    }

    window.attemptEntry = () => {
        if (correctPass && document.getElementById('authPass').value.trim() !== correctPass) { alert("合言葉が違います"); return; }
        localStorage.setItem('en_chatActive', 'true');
        showView('chat-view'); initChat();
    };

    function initChat() {
        onValue(ref(db, 'chats/' + room), (snap) => {
            const area = document.getElementById('chat-area');
            area.innerHTML = "";
            snap.forEach(c => {
                const d = c.val(), isMe = (d.s === myN);
                const row = document.createElement('div'); row.className = `msg-row ${isMe ? 'me' : 'you'}`;
                const m = document.createElement('div'); m.className = `msg ${isMe ? 'me' : 'you'}`;
                m.innerText = d.t;
                row.appendChild(m); area.appendChild(row);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    window.sendMsg = () => {
        const i = document.getElementById('chatInput'); if (!i.value.trim()) return;
        push(ref(db, 'chats/' + room), { s: myN, t: i.value }); i.value = "";
    };

    window.handleExit = () => {
        if (currentViewId === 'chat-view') localStorage.removeItem('en_chatActive');
        else { localStorage.removeItem('en_me'); localStorage.removeItem('en_partner'); }
        location.reload();
    };

    window.saveSettings = async () => {
        const p = document.getElementById('newPass').value.trim();
        if (p) await update(ref(db, `matching/${room}`), { pass: p });
        closeModal();
    };

    window.openModal = () => { document.getElementById('newPass').value = correctPass; document.getElementById('settingsModal').style.display = 'flex'; };
    window.closeModal = () => document.getElementById('settingsModal').style.display = 'none';
    
    window.fullReset = async () => {
        if(confirm("お清め（消去）しますか？")) {
            await remove(ref(db, `chats/${room}`));
            await remove(ref(db, `matching/${room}`));
            localStorage.clear(); location.reload();
        }
    };
</script>
</body>
</html>
