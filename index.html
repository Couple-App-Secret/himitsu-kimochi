<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SECRET OMAMORI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Shippori+Mincho:wght@700&display=swap');
        
        :root { 
            --oma-white: #F4F2ED;  /* 画像のベース色 */
            --oma-red: #B02A26;    /* 紐の赤 */
            --oma-navy: #243354;   /* 紐の紺 */
            --oma-gold: #B8A078;   /* SECRETの文字色 */
            --oma-shadow: rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            height: 100dvh; 
            background: var(--oma-white); 
            font-family: 'Zen Maru Gothic', sans-serif; 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
            /* 麻の葉文様の背景シミュレーション */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MCIgaGVpZ2h0PSIzNC42NCIgdmlld0JveD0iMCAwIDYwIDM0LjY0Ij48cGF0aCBkPSJNMzAgMEwwIDM0LjY0aDYwek0wIDBoMzBMMTUgMjUuOTh6bTMwIDBoMzBMNDUgMjUuOTh6IiBmaWxsPSJub25lIiBzdHJva2U9IiNlZWUiIHN0cm9rZS13aWR0aD0iMC41Ii8+PC9zdmc+');
        }

        .app-container { 
            display: flex; flex-direction: column; height: 100%; 
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
            align-items: center;
        }

        /* 上部の結び目セクション */
        .knot-area {
            padding: 40px 0 20px;
            text-align: center;
        }
        .knot-svg {
            width: 120px; height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .secret-title {
            font-family: 'Shippori Mincho', serif;
            font-size: 1.4rem;
            color: var(--oma-gold);
            letter-spacing: 0.3em;
            margin: 10px 0 30px;
            text-transform: uppercase;
        }

        /* 入力エリア：お守りの布地に沈み込むようなデザイン */
        .input-group {
            width: 85%; max-width: 300px;
            display: flex; flex-direction: column; gap: 20px;
        }

        input[type="text"] {
            width: 100%; padding: 18px;
            background: var(--oma-white);
            border: none;
            border-radius: 12px;
            box-shadow: inset 3px 3px 6px #e0ded9, inset -3px -3px 6px #ffffff; /* エンボス加工 */
            text-align: center; font-size: 16px; outline: none;
            color: var(--oma-navy); font-family: 'Shippori Mincho', serif;
        }

        /* 紺と赤のボタン（画像のボタンイメージ） */
        .btn-wrap { display: flex; gap: 15px; width: 100%; justify-content: center; margin-top: 10px; }
        .oma-btn {
            flex: 1; padding: 18px; border: none; border-radius: 12px;
            font-weight: bold; font-size: 0.85rem; color: #fff;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.15);
            cursor: pointer; transition: 0.2s;
        }
        .oma-btn.navy { background: var(--oma-navy); }
        .oma-btn.red { background: var(--oma-red); }
        .oma-btn:active { transform: scale(0.97); }

        /* チャット画面 */
        #chat-view { padding: 0; background: transparent; width: 100%; flex: 1; display: none; flex-direction: column; }
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { 
            max-width: 80%; padding: 12px 18px; border-radius: 15px; margin-bottom: 10px;
            font-size: 0.95rem; line-height: 1.5;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.03);
        }
        .me { align-self: flex-end; background: var(--oma-navy); color: white; border-bottom-right-radius: 2px; }
        .you { align-self: flex-start; background: white; color: var(--oma-navy); border-bottom-left-radius: 2px; }

        .chat-input-wrap {
            padding: 15px; background: var(--oma-white); border-top: 1px solid #e0ded9;
            display: flex; gap: 10px;
        }

        .settings-trigger { position: absolute; top: 15px; right: 15px; color: var(--oma-gold); cursor: pointer; }
        .exit-btn { position: absolute; top: 15px; left: 15px; color: #ccc; font-size: 0.8rem; cursor: pointer; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--oma-white); padding: 30px; border-radius: 20px; width: 85%; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="exit" class="exit-btn" style="display:none;" onclick="handleExit()">✕ CLOSE</div>
    <div id="gear" class="settings-trigger" style="display:none;" onclick="openModal()">⚙</div>

    <div class="knot-area" id="knot-header">
        <svg class="knot-svg" viewBox="0 0 100 60">
            <path d="M20 30 Q 20 10 35 15 L 65 45 Q 80 50 80 30 Q 80 10 65 15 L 35 45 Q 20 50 20 30" 
                  fill="none" stroke="#B02A26" stroke-width="6" />
            <path d="M20 30 Q 20 10 35 15 L 65 45 Q 80 50 80 30 Q 80 10 65 15 L 35 45 Q 20 50 20 30" 
                  fill="none" stroke="#243354" stroke-width="6" stroke-dasharray="8 4" />
            <circle cx="50" cy="30" r="4" fill="#B8A078" />
        </svg>
        <div class="secret-title">Secret</div>
    </div>

    <div id="setup-view" class="view" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="input-group">
            <input type="text" id="myName" placeholder="御名前" onchange="cleanInput(this)">
            <input type="text" id="crushName" placeholder="御相手" onchange="cleanInput(this)">
            <div class="btn-wrap">
                <button class="oma-btn navy" onclick="startMatching()">願いを</button>
                <button class="oma-btn red" onclick="startMatching()">記す</button>
            </div>
        </div>
    </div>

    <div id="chat-view">
        <div id="chat-area"></div>
        <div class="chat-input-wrap">
            <input type="text" id="chatInput" placeholder="筆を執る..." autocomplete="off">
            <button class="oma-btn red" style="flex:none; width:50px; padding:0;" onclick="sendMsg()">▶</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", authDomain: "coupleapp-30f82.firebaseapp.com", databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", projectId: "coupleapp-30f82", appId: "1:205261235219:web:38b93dde060e520cdecbe6" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myN = localStorage.getItem('en_me'), partnerN = localStorage.getItem('en_partner'), room = "";

    window.cleanInput = (el) => {
        let val = el.value;
        if (!val) return;
        val = val.replace(/[ぁ-ん]/g, (s) => String.fromCharCode(s.charCodeAt(0) + 0x60));
        val = val.replace(/[^ァ-ンヴー]/g, '');
        el.value = val.trim();
    };

    function showView(isChat) {
        document.getElementById('setup-view').style.display = isChat ? 'none' : 'flex';
        document.getElementById('chat-view').style.display = isChat ? 'flex' : 'none';
        document.getElementById('exit').style.display = isChat ? 'block' : 'none';
        document.getElementById('gear').style.display = isChat ? 'block' : 'none';
        if(isChat) document.getElementById('knot-header').style.padding = '10px 0';
    }

    window.onload = () => { if (myN && partnerN) startSync(); else showView(false); };

    window.startMatching = async () => {
        const n1 = document.getElementById('myName').value.trim();
        const n2 = document.getElementById('crushName').value.trim();
        if (!n1 || !n2) return;
        myN = n1; partnerN = n2; room = [myN, partnerN].sort().join('_');
        localStorage.setItem('en_me', myN); localStorage.setItem('en_partner', partnerN);
        await update(ref(db, `matching/${room}/${myN}`), { active: true });
        startSync();
    };

    function startSync() {
        room = [myN, partnerN].sort().join('_');
        onValue(ref(db, `matching/${room}`), (snap) => {
            const data = snap.val() || {};
            if (data[myN]?.active && data[partnerN]?.active) {
                showView(true); initChat();
            } else {
                // 片方待ち状態などの処理（今回はシンプルに表示切り替え）
            }
        });
    }

    function initChat() {
        onValue(ref(db, 'chats/' + room), (snap) => {
            const area = document.getElementById('chat-area');
            area.innerHTML = "";
            snap.forEach(c => {
                const d = c.val(), isMe = (d.s === myN);
                const m = document.createElement('div');
                m.className = `msg ${isMe ? 'me' : 'you'}`;
                m.innerText = d.t;
                area.appendChild(m);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    window.sendMsg = () => {
        const i = document.getElementById('chatInput'); if (!i.value.trim()) return;
        push(ref(db, 'chats/' + room), { s: myN, t: i.value }); i.value = "";
    };

    window.handleExit = () => {
        localStorage.clear(); location.reload();
    };
</script>
</body>
</html>
