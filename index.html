<input type="text" id="myName" placeholder="あなた" 
       oncompositionend="cleanInput(this)" 
       onblur="cleanInput(this)">
<input type="text" id="crushName" placeholder="お相手" 
       oncompositionend="cleanInput(this)" 
       onblur="cleanInput(this)">

<script>
    // 文字のクリーニング関数
    window.cleanInput = (el) => {
        let val = el.value;
        
        // 1. ひらがなをカタカナに変換
        val = val.replace(/[ぁ-ん]/g, (s) => String.fromCharCode(s.charCodeAt(0) + 0x60));
        
        // 2. 全角英数字を半角にする（念のため）
        val = val.replace(/[Ａ-Ｚａ-ｚ０-９]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xfee0));
        
        // 3. カタカナ・ヴ・長音記号 以外をすべて削除
        val = val.replace(/[^ァ-ンヴー]/g, '');
        
        // 書き戻し
        el.value = val;
    };
</script>
