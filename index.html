<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>縁結び</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap'); /* 筆文字用 */

        :root { --sakura: #f4a7b9; --gold: #d4af37; --text: #4a2535; --muted: #a38b96; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #fffafb; font-family: 'Zen Maru Gothic', sans-serif; color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .container { flex: 1; display: flex; flex-direction: column; padding: 15px; padding-top: env(safe-area-inset-top); max-width: 450px; margin: 0 auto; width: 100%; }
        .card { background: white; border-radius: 30px; flex: 1; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); position: relative; overflow: hidden; border: 1px solid #fdf0f3; }
        
        /* ヘッダー */
        .header { text-align: center; margin-bottom: 15px; position: relative; z-index: 10; }
        h1 { font-size: 1.2rem; color: var(--sakura); letter-spacing: 0.5em; }
        .update-tag { font-size: 0.6rem; color: var(--muted); }

        .step { display: none; height: 100%; flex-direction: column; justify-content: center; z-index: 5; }
        .step.active { display: flex; }

        /* 入力フォーム */
        input[type="text"] { width: 100%; padding: 15px; border: 1px solid #f0f0f0; border-radius: 15px; font-size: 1rem; margin-bottom: 10px; background: #fdfdfd; outline: none; }
        .btn { width: 100%; padding: 16px; background: var(--sakura); color: white; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #eee; }

        /* 成就演出 */
        .shoji-text { font-family: 'Yuji Syuku', serif; font-size: 4rem; color: var(--gold); text-shadow: 0 0 20px rgba(212,175,55,0.3); animation: zoomIn 1.5s ease-out; margin-bottom: 20px; text-align: center; }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .sakura-fall { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .petal { position: absolute; background: var(--sakura); border-radius: 150% 0 150% 0; opacity: 0.7; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }

        /* チャット */
        #chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px 0; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 20px; font-size: 0.95rem; }
        .msg.me { align-self: flex-end; background: var(--sakura); color: white; border-bottom-right-radius: 2px; }
        .msg.you { align-self: flex-start; background: #f0f0f0; border-bottom-left-radius: 2px; }

        .settings-btn { position: absolute; top: 20px; right: 20px; font-size: 1.2rem; cursor: pointer; color: #ddd; z-index: 20; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 85%; max-width: 300px; text-align: center; }
    </style>
</head>
<body>

    <div id="settingsModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:15px; font-size:0.9rem;">設定</h3>
            <button class="btn" style="background:#ff9999;" onclick="fullReset()">ご縁をリセットする</button>
            <p style="font-size:0.7rem; color:var(--muted); margin-top:10px;">※リセットすると他の人とマッチング可能になります</p>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div id="sakura-container" class="sakura-fall"></div>
            <div class="header">
                <h1>縁結び</h1>
                <span class="update-tag">Ver. 2026-0421-00:00</span>
                <div id="gear" class="settings-btn" style="display:none;" onclick="document.getElementById('settingsModal').style.display='flex'">⚙</div>
            </div>

            <div id="step0" class="step active">
                <input type="text" id="myName" placeholder="あなたの名前（カタカナ）" oninput="checkInput()">
                <input type="text" id="crushName" placeholder="お相手の名前（カタカナ）" oninput="checkInput()">
                <button id="submitBtn" class="btn" onclick="sendFeeling()" disabled>想いをおくる</button>
            </div>

            <div id="step-achieved" class="step">
                <div class="shoji-text">成就</div>
                <p style="text-align:center; color:var(--muted); margin-bottom:30px;">二人のご縁が結ばれました</p>
                <button class="btn" onclick="startChat()">二人の場所へ</button>
            </div>

            <div id="step-chat" class="step">
                <div id="chat-area"></div>
                <div style="display:flex; gap:10px; padding-top:10px;">
                    <input type="text" id="chatInput" placeholder="メッセージ..." style="margin:0;">
                    <button onclick="sendMsg()" style="background:var(--sakura); border:none; color:white; width:50px; border-radius:15px;">▶</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, serverTimestamp, update, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", authDomain: "coupleapp-30f82.firebaseapp.com", databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", projectId: "coupleapp-30f82", appId: "1:205261235219:web:38b93dde060e520cdecbe6" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myName = "";
    let crushName = "";
    let roomPath = "";

    // 桜を降らせる
    function createSakura() {
        const container = document.getElementById('sakura-container');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = (Math.random() * 10 + 5) + 'px';
            p.style.animationDuration = (Math.random() * 3 + 2) + 's';
            p.style.animationDelay = (Math.random() * 2) + 's';
            container.appendChild(p);
        }
    }

    window.checkInput = () => {
        const v1 = document.getElementById('myName').value.trim();
        const v2 = document.getElementById('crushName').value.trim();
        document.getElementById('submitBtn').disabled = !(v1 && v2);
    };

    window.sendFeeling = async () => {
        myName = document.getElementById('myName').value.trim();
        crushName = document.getElementById('crushName').value.trim();
        roomPath = [myName, crushName].sort().join('_');

        await set(ref(db, 'feelings/' + myName), { crush: crushName });
        
        onValue(ref(db, 'feelings/' + crushName), (snap) => {
            if (snap.exists() && snap.val().crush === myName) {
                achieve();
            }
        });
    };

    async function achieve() {
        await update(ref(db, 'rooms/' + roomPath), { status: 'achieved' });
        // 他の「想い」を消去して一途モードへ
        await remove(ref(db, 'feelings/' + myName));
        
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-achieved').classList.add('active');
        createSakura();
    }

    window.startChat = () => {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-chat').classList.add('active');
        document.getElementById('gear').style.display = 'block';
        
        onValue(ref(db, 'chats/' + roomPath), (snap) => {
            const area = document.getElementById('chat-area');
            area.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const m = document.createElement('div');
                m.className = `msg ${d.sender === myName ? 'me' : 'you'}`;
                m.innerText = d.text;
                area.appendChild(m);
            });
            area.scrollTop = area.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chatInput');
        if (!i.value.trim()) return;
        await push(ref(db, 'chats/' + roomPath), { sender: myName, text: i.value });
        i.value = "";
    };

    window.fullReset = async () => {
        if(confirm("このご縁をリセットしますか？")){
            await remove(ref(db, 'rooms/' + roomPath));
            await remove(ref(db, 'chats/' + roomPath));
            location.reload();
        }
    };
</script>
</body>
</html>
