<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>縁結び SECRET</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Shippori+Mincho:wght@700&display=swap');
        
        :root { 
            --oma-white: #F4F2ED; 
            --oma-red: #B02A26; 
            --oma-navy: #243354;
            --oma-gold: #B8A078;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            height: 100dvh; 
            background: var(--oma-white); 
            font-family: 'Zen Maru Gothic', sans-serif; 
            overflow: hidden; position: fixed; width: 100%; 
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MCIgaGVpZ2h0PSIzNC42NCIgdmlld0JveD0iMCAwIDYwIDM0LjY0Ij48cGF0aCBkPSJNMzAgMEwwIDM0LjY0aDYwek0wIDBoMzBMMTUgMjUuOTh6bTMwIDBoMzBMNDUgMjUuOTh6IiBmaWxsPSJub25lIiBzdHJva2U9IiNlZWUiIHN0cm9rZS13aWR0aD0iMC44Ii8+PC9zdmc+');
        }

        .app-container { 
            display: flex; flex-direction: column; height: 100%; 
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
            align-items: center;
        }

        /* 縁結びのシンボル：インフィニティ結び */
        .knot-area { padding: 30px 0 10px; text-align: center; position: relative; }
        .knot-svg { width: 100px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        
        /* 画面中央を縦に貫く「赤い糸」 */
        .red-thread {
            position: absolute; top: 100px; bottom: -50px; left: 50%;
            width: 1.5px; background: var(--oma-red); opacity: 0.3;
            transform: translateX(-50%); z-index: 0;
        }

        .secret-title {
            font-family: 'Shippori Mincho', serif;
            font-size: 1.2rem; color: var(--oma-gold);
            letter-spacing: 0.5em; margin: 15px 0; text-transform: uppercase;
        }

        /* 入力欄：より「記帳」に近い質感に */
        .input-group { width: 85%; max-width: 280px; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        input[type="text"] {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.7);
            border: 1px solid #e0ded9; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            text-align: center; font-size: 16px; outline: none;
            color: var(--oma-navy); font-family: 'Shippori Mincho', serif;
        }

        /* 結びボタン */
        .btn-join {
            width: 80px; height: 80px; background: var(--oma-navy);
            border-radius: 50%; color: var(--oma-gold); border: 2px solid var(--oma-gold);
            font-family: 'Shippori Mincho', serif; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            margin: 20px auto; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* チャット：結ばれていくメッセージ */
        #chat-view { width: 100%; flex: 1; display: none; flex-direction: column; background: rgba(255,255,255,0.5); }
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { 
            max-width: 75%; padding: 12px 18px; border-radius: 20px; margin-bottom: 8px;
            font-size: 0.95rem; line-height: 1.5; position: relative;
        }
        .me { align-self: flex-end; background: var(--oma-navy); color: white; border-bottom-right-radius: 4px; }
        .you { align-self: flex-start; background: var(--oma-red); color: white; border-bottom-left-radius: 4px; }

        .chat-input-wrap {
            padding: 15px; background: var(--oma-white); border-top: 1px solid #e0ded9;
            display: flex; gap: 10px; align-items: center;
        }
        #chatInput { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        
        .settings-trigger { position: absolute; top: 15px; right: 15px; color: var(--oma-gold); font-size: 1.2rem; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="gear" class="settings-trigger" style="display:none;" onclick="location.reload()">✕</div>
    <div class="red-thread" id="thread-line"></div>

    <div class="knot-area">
        <svg class="knot-svg" viewBox="0 0 100 60">
            <path d="M20 30 Q 20 10 35 15 L 65 45 Q 80 50 80 30 Q 80 10 65 15 L 35 45 Q 20 50 20 30" 
                  fill="none" stroke="#B02A26" stroke-width="5" />
            <path d="M20 30 Q 20 10 35 15 L 65 45 Q 80 50 80 30 Q 80 10 65 15 L 35 45 Q 20 50 20 30" 
                  fill="none" stroke="#243354" stroke-width="5" stroke-dasharray="10 5" />
            <circle cx="50" cy="30" r="5" fill="#B8A078" />
        </svg>
        <div class="secret-title">結び</div>
    </div>

    <div id="setup-view" class="view" style="display: flex; flex-direction: column; align-items: center;">
        <div class="input-group">
            <input type="text" id="myName" placeholder="御自身の名" onchange="cleanInput(this)">
            <input type="text" id="crushName" placeholder="御相手の名" onchange="cleanInput(this)">
        </div>
        <div class="btn-join" onclick="startMatching()">結</div>
        <p style="font-size: 0.7rem; color: var(--oma-gold); letter-spacing: 0.1em; margin-top: 10px;">二人の想いを一つに</p>
    </div>

    <div id="chat-view">
        <div id="chat-area"></div>
        <div class="chat-input-wrap">
            <input type="text" id="chatInput" placeholder="想いを綴る..." autocomplete="off">
            <button onclick="sendMsg()" style="background:var(--oma-navy); color:white; border:none; padding:10px 15px; border-radius:15px;">送信</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyDSLwUVNPR63ez6gbWpimnaR_0p4NTfdG8", authDomain: "coupleapp-30f82.firebaseapp.com", databaseURL: "https://coupleapp-30f82-default-rtdb.firebaseio.com", projectId: "coupleapp-30f82", appId: "1:205261235219:web:38b93dde060e520cdecbe6" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myN = localStorage.getItem('en_me'), partnerN = localStorage.getItem('en_partner'), room = "";

    window.cleanInput = (el) => {
        let val = el.value; if (!val) return;
        val = val.replace(/[ぁ-ん]/g, (s) => String.fromCharCode(s.charCodeAt(0) + 0x60));
        val = val.replace(/[^ァ-ンヴー]/g, ''); el.value = val.trim();
    };

    function showView(isChat) {
        document.getElementById('setup-view').style.display = isChat ? 'none' : 'flex';
        document.getElementById('chat-view').style.display = isChat ? 'flex' : 'none';
        document.getElementById('gear').style.display = isChat ? 'block' : 'none';
        document.getElementById('thread-line').style.opacity = isChat ? '0.1' : '0.3';
    }

    window.onload = () => { if (myN && partnerN) startSync(); else showView(false); };

    window.startMatching = async () => {
        const n1 = document.getElementById('myName').value.trim();
        const n2 = document.getElementById('crushName').value.trim();
        if (!n1 || !n2) return;
        myN = n1; partnerN = n2; room = [myN, partnerN].sort().join('_');
        localStorage.setItem('en_me', myN); localStorage.setItem('en_partner', partnerN);
        await update(ref(db, `matching/${room}/${myN}`), { active: true });
        startSync();
    };

    function startSync() {
        room = [myN, partnerN].sort().join('_');
        onValue(ref(db, `matching/${room}`), (snap) => {
            const data = snap.val() || {};
            if (data[myN]?.active && data[partnerN]?.active) {
                showView(true); initChat();
            }
        });
    }

    function initChat() {
        onValue(ref(db, 'chats/' + room), (snap) => {
            const area = document.getElementById('chat-area');
            area.innerHTML = "";
            snap.forEach(c => {
                const d = c.val(), isMe = (d.s === myN);
                const m = document.createElement('div');
                m.className = `msg ${isMe ? 'me' : 'you'}`;
                m.innerText = d.t;
                area.appendChild(m);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    window.sendMsg = () => {
        const i = document.getElementById('chatInput'); if (!i.value.trim()) return;
        push(ref(db, 'chats/' + room), { s: myN, t: i.value }); i.value = "";
    };
</script>
</body>
</html>
